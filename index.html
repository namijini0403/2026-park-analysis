            title: "설치 전략 제안",
            primary_label: "우선 권장",
            primary_value: panel?.strategy_recommendation?.primary_recommendation || "정보 없음",
            secondary_label: "보조 대안",
            secondary_value: secondaryOption,
            secondary_visible: Boolean(secondaryOption)
          },
          explanation_section: {
            title: "판단 근거",
            summary: panel?.explanation?.recommendation_reason_summary || "설명 정보 없음",
            tags: explanationTags,
            note: panel?.accessibility_summary?.land_feasibility_note || null,
            tags_visible: explanationTags.length > 0
          },
          linked_school_section: {
            title: "도보 500m 내 학교",
            count_label: `도보 500m 내 학교 ${Number(linkedSchools.linked_school_count || 0)}개`,
            names: linkedSchoolNames.length ? linkedSchoolNames : linkedSchoolIds,
            ids: linkedSchoolIds,
            items: linkedSchoolRows.map((school) => ({
              school_id: school.school_id,
              school_name: school.school_name,
              display_name: school.school_name || school.school_id,
              case_label: school.case_label || null
            })),
            empty_message: Number(linkedSchools.linked_school_count || 0) > 0 ? null : "연결 학교 정보 없음"
          },
          warning_flags: panel?.ui_flags?.requires_field_review
            ? [{ key: "requires_field_review", label: "현장 검토 필요", tone: "warning" }]
            : []
        };
      }

      const landFeasibilityLevel = panel?.accessibility_summary?.land_feasibility_level || null;
      const badges = [
        { key: "candidate_type", label: getCandidateTypeLabel(candidateType), tone: "info" }
      ];
      if (panel?.ui_flags?.show_land_feasibility_badge !== false) {
        badges.push({
          key: "land_feasibility_level",
          label: getCandidateLandFeasibilityLabel(landFeasibilityLevel),
          tone: landFeasibilityLevel === "high" ? "positive" : landFeasibilityLevel === "low" ? "danger" : "warning"
        });
      }

      const warningFlags = [];
      if (panel?.ui_flags?.requires_field_review) {
        warningFlags.push({ key: "requires_field_review", label: "현장 검토 필요", tone: "warning" });
      }
      if (landFeasibilityLevel === "low") {
        warningFlags.push({ key: "external_low_feasibility", label: "외부 설치 어려움", tone: "danger" });
      }

      return {
        panel_kind: "external_grid",
        title: `${[panel?.candidate_meta?.gu, panel?.candidate_meta?.dong].filter(Boolean).join(" ")} 외부 후보지`.trim(),
        subtitle: `연결 학교 ${Number(linkedSchools.linked_school_count || 0)}개 · 생활권 설치 검토 후보`,
        badges,
        demand_cards: panel?.ui_flags?.show_demand_cards === false ? [] : [
          {
            key: "predicted_2029",
            label: "2029 XGBoost 예측 잠재수혜인원",
            value: formatCandidatePotentialDemand(panel?.demand_summary?.predicted_2029),
            note: panel?.demand_summary?.demand_note || "250m 격자 단위 XGBoost 예측 잠재수혜인원입니다."
          },
          {
            key: "predicted_2031",
            label: "2031 XGBoost 예측 잠재수혜인원",
            value: formatCandidatePotentialDemand(panel?.demand_summary?.predicted_2031),
            note: panel?.demand_summary?.demand_note || "250m 격자 단위 XGBoost 예측 잠재수혜인원입니다."
          }
        ],
        accessibility_items: panel?.ui_flags?.show_accessibility_metrics === false ? [] : [
          { key: "nearby_park_count", label: "등시권 내 공원 수", value: formatCandidateValue(panel?.accessibility_summary?.nearby_park_count) },
          { key: "nearby_playground_count", label: "등시권 내 놀이터 수", value: formatCandidateValue(panel?.accessibility_summary?.nearby_playground_count) },
          { key: "nearest_park_dist_m", label: "최근접 공원 거리", value: formatCandidateValue(panel?.accessibility_summary?.nearest_park_dist_m, "m") },
          { key: "has_large_apt", label: "대단지 여부", value: panel?.accessibility_summary?.has_large_apt === null ? "정보 없음" : panel?.accessibility_summary?.has_large_apt ? "대단지 있음" : "대단지 없음" },
          { key: "redev_status_simple", label: "재개발 상태", value: panel?.accessibility_summary?.redev_status_simple || "정보 없음" }
        ],
        strategy_section: {
          title: "설치 전략 제안",
          primary_label: "우선 권장",
          primary_value: panel?.strategy_recommendation?.primary_recommendation || "정보 없음",
          secondary_label: "보조 대안",
          secondary_value: secondaryOption,
          secondary_visible: Boolean(secondaryOption)
        },
        explanation_section: {
          title: "판단 근거",
          summary: panel?.explanation?.recommendation_reason_summary || "설명 정보 없음",
          tags: explanationTags,
          note: panel?.accessibility_summary?.land_feasibility_note || null,
          tags_visible: explanationTags.length > 0
        },
        linked_school_section: {
          title: "도보 500m 내 학교",
          count_label: `도보 500m 내 학교 ${Number(linkedSchools.linked_school_count || 0)}개`,
          names: linkedSchoolNames.length ? linkedSchoolNames : linkedSchoolIds,
          ids: linkedSchoolIds,
          items: linkedSchoolRows.map((school) => ({
            school_id: school.school_id,
            school_name: school.school_name,
            display_name: school.school_name || school.school_id,
            case_label: school.case_label || null
          })),
          empty_message: Number(linkedSchools.linked_school_count || 0) > 0 ? null : "연결 학교 정보 없음"
        },
        warning_flags: warningFlags
      };
    }

    function renderCandidateBadgeList(badges) {
      if (!Array.isArray(badges) || !badges.length) return "";
      return `
        <div class="detail-badge-row">
          ${badges.map((badge) => `<div class="detail-badge ${getCandidateBadgeToneClass(badge.tone)}">${badge.label}</div>`).join("")}
        </div>
      `;
    }

    function renderCandidateWarningFlags(warningFlags) {
      if (!Array.isArray(warningFlags) || !warningFlags.length) return "";
      return warningFlags
        .map((flag) => `<div class="detail-message-extra">${flag.label}</div>`)
        .join("");
    }

    function renderCandidateInfoCards(cards) {
      if (!Array.isArray(cards) || !cards.length) return "";
      return `
        <div class="metric-list">
          ${cards.map((card) => `
            <div class="metric-item">
              <strong>${card.label}</strong>: ${card.value}
              ${card.note ? `<div class="metric-item muted" style="margin-top:6px;">${card.note}</div>` : ""}
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderCandidateLabeledValues(items) {
      if (!Array.isArray(items) || !items.length) return "";
      return `
        <div class="metric-list">
          ${items.map((item) => `<div class="metric-item"><strong>${item.label}</strong>: ${item.value}</div>`).join("")}
        </div>
      `;
    }

    function renderCandidateStrategySection(strategySection) {
      if (!strategySection) return "";
      const secondaryValue = getCandidateSecondaryOptionDisplayValue(strategySection.secondary_value);
      const secondaryClass = strategySection.secondary_visible ? "metric-item" : "metric-item muted";
      return `
        <div class="metric-list">
          <div class="metric-item"><strong>${strategySection.primary_label}</strong>: ${strategySection.primary_value}</div>
          <div class="${secondaryClass}"><strong>${strategySection.secondary_label}</strong>: ${secondaryValue}</div>
        </div>
      `;
    }

    function renderCandidateExplanationSection(explanationSection) {
      if (!explanationSection) return "";
      const tagsMarkup = explanationSection.tags_visible
        ? `<div class="detail-badge-row">${explanationSection.tags.map((tag) => `<div class="detail-badge neutral">${tag}</div>`).join("")}</div>`
        : "";

      return `
        <div class="metric-list">
          <div class="metric-item">${explanationSection.summary}</div>
          ${explanationSection.note ? `<div class="metric-item muted">${explanationSection.note}</div>` : ""}
          ${tagsMarkup}
        </div>
      `;
    }

    function renderCandidateLinkedSchoolSection(linkedSchoolSection) {
      if (!linkedSchoolSection) return "";
      if (!linkedSchoolSection.items.length) {
        return `<div class="metric-item muted">${linkedSchoolSection.empty_message || "연결 학교 정보 없음"}</div>`;
      }

      return `
        <div class="metric-list">
          <div class="metric-item">${linkedSchoolSection.count_label}</div>
          <ul style="margin:6px 0 0 18px; padding:0; line-height:1.7;">
            ${linkedSchoolSection.items.map((item) => `
              <li>
                ${item.display_name}
                ${item.case_label ? ` · ${item.case_label}` : ""}
              </li>
            `).join("")}
          </ul>
        </div>
      `;
    }

    function renderCandidatePanel(rawCandidateResponse = null) {
      if (!rawCandidateResponse) {
        ui.schoolDetailBox.className = "school-detail-box";
        ui.schoolDetailBox.innerHTML = "후보지 패널 데이터가 없습니다.";
        return;
      }

      const viewModel = mapCandidatePanelResponseToViewModel(rawCandidateResponse);
      const panelThemeClass = viewModel.panel_kind === "school_internal" ? "case-island" : "case-case2";

      ui.schoolDetailBox.className = `school-detail-box ${panelThemeClass}`;
      ui.schoolDetailBox.innerHTML = `
        <div class="detail-head">
          <h3 class="detail-name">${viewModel.title}</h3>
          <div class="detail-subtitle">${viewModel.subtitle}</div>
          ${renderCandidateBadgeList(viewModel.badges)}
          ${state.selectedCandidateId ? `<div class="detail-message-extra">candidate_id: ${state.selectedCandidateId}</div>` : ""}
        </div>
        <div class="detail-message ${panelThemeClass}">
          ${viewModel.panel_kind === "school_internal"
            ? "학교 내부 후보지는 좌표 기반 확정 설치지가 아니라 설치 검토 가능한 내부 대안입니다."
            : "외부 후보지는 생활권 내 설치 검토 후보이며, 실제 토지 가능성은 현장 검토가 필요합니다."}
          ${renderCandidateWarningFlags(viewModel.warning_flags)}
        </div>
        ${viewModel.demand_cards.length ? `
          <div class="detail-section">
            <div class="detail-section-title">${viewModel.panel_kind === "external_grid" ? "XGBoost 예측 잠재수혜인원" : "잠재 수요 추정"}</div>
            ${renderCandidateInfoCards(viewModel.demand_cards)}
          </div>
        ` : ""}
        ${viewModel.accessibility_items.length ? `
          <div class="detail-section">
            <div class="detail-section-title">${viewModel.panel_kind === "school_internal" ? "내부 대안 검토 정보" : "지역 접근성 요약"}</div>
            ${renderCandidateLabeledValues(viewModel.accessibility_items)}
          </div>
        ` : ""}
        <div class="detail-section">
          <div class="detail-section-title">${viewModel.strategy_section.title}</div>
          ${renderCandidateStrategySection(viewModel.strategy_section)}
        </div>
        <div class="detail-section">
          <div class="detail-section-title">${viewModel.explanation_section.title}</div>
          ${renderCandidateExplanationSection(viewModel.explanation_section)}
        </div>
        ${(viewModel.linked_school_section.items.length || viewModel.linked_school_section.empty_message) ? `
          <div class="detail-section">
            <div class="detail-section-title">${viewModel.linked_school_section.title}</div>
            ${renderCandidateLinkedSchoolSection(viewModel.linked_school_section)}
          </div>
        ` : ""}
      `;
    }

    function renderDetailPanel(payload = null) {
      if (isCandidatePanelResponse(payload)) {
        renderCandidatePanel(payload);
        return;
      }

      renderSchoolDetail(payload);
    }

    function openCandidatePanel(rawCandidateResponse) {
      if (!isCandidatePanelResponse(rawCandidateResponse)) {
        console.warn("[candidate-panel] invalid candidate response", rawCandidateResponse);
        return;
      }

      setCandidatePanelSelection(rawCandidateResponse);
      renderDetailPanel(rawCandidateResponse);
      openPanel();
      // TODO: connect selectedCandidateId to candidate marker highlight when real candidate API/layer is added.
    }

    async function debugOpenCandidateExample(index = 0) {
      const examples =
        Array.isArray(state.datasets.candidatePanelExamples) && state.datasets.candidatePanelExamples.length
          ? state.datasets.candidatePanelExamples
          : await loadCandidateExamples();
      const candidate = examples[index];
      if (!candidate) {
        console.warn(`[candidate-panel] example not found for index ${index}`);
        return;
      }

      openCandidatePanel(candidate);
    }

    function debugOpenExternalCandidateExample() {
      return debugOpenCandidateExample(0);
    }

    function debugOpenInternalCandidateExample() {
      return debugOpenCandidateExample(1);
    }

    window.openCandidatePanel = openCandidatePanel;
    window.openCandidatePanelById = openCandidatePanelById;
    window.findCandidateById = findCandidateById;
    window.debugOpenCandidateExample = debugOpenCandidateExample;
    window.debugOpenExternalCandidateExample = debugOpenExternalCandidateExample;
    window.debugOpenInternalCandidateExample = debugOpenInternalCandidateExample;
    window.clearDetailPanelSelection = clearDetailPanelSelection;

    function renderSchoolDetail(row = null) {
      if (!row) {
        ui.schoolDetailBox.className = "school-detail-box";
        ui.schoolDetailBox.innerHTML = "학교 마커를 클릭하면 상세 리포트가 열립니다.";
        return;
      }

      const gu = detectGu(row) || "-";
      const caseLabel = getCaseTypeLabel(row);
      const badge = getSchoolBadge(row);
      const mirageBadge = getMirageBadge(row);

      // 우측 패널: 미니멀 요약 카드만 표시
      ui.schoolDetailBox.className = `school-detail-box ${getCaseThemeClass(row)}`;
      ui.schoolDetailBox.innerHTML = `
        <div class="detail-head">
          <h3 class="detail-name">${getSchoolName(row)} (${gu})</h3>
          <div class="detail-subtitle">${caseLabel}</div>
          <div class="detail-badge-row">
            <div class="detail-badge ${badge.className}">[${badge.text}]</div>
            ${mirageBadge ? `<div class="detail-badge ${mirageBadge.className}">[${mirageBadge.text}]</div>` : ""}
          </div>
        </div>
        <div class="detail-message ${getCaseThemeClass(row)}" style="font-size:13px; margin-bottom:16px;">
          ${getDiagnosticMessage(row)}
        </div>
        <div style="font-size:12px; color:var(--muted); line-height:1.7; margin-bottom:20px;">
          🌳 최근접 공원 ${formatDistanceMeters(row.nearest_park_dist_m)}m &nbsp;·&nbsp;
          🛝 도보 놀이터 ${formatCount(row.iso_playground_count)}개 &nbsp;·&nbsp;
          🌿 녹지 ${formatDecimal(row.iso_green_ratio, 1)}%
        </div>
        <button
          onclick="openSimulationOverlay()"
          style="
            width:100%; padding:13px 0;
            border-radius:10px; border:none; cursor:pointer;
            background:#1a1a2e; color:#fff;
            font-size:14px; font-weight:700;
            letter-spacing:0.02em;
          "
        >📊 상세 리포트 · 시뮬레이션 열기</button>
      `;

      // localStorage에 학교 데이터 저장 (iframe 브릿지)
      // 유사학교 공원 데이터 보강 + 시·구 최우수학교 보강
      const _enrichedRow = Object.assign({}, row);
      const _gu = detectGu(row) || "";
      let _legacySnapshot = null;

      // 유사학교 공원 데이터 보강
      for (let _i = 1; _i <= 5; _i++) {
        const _simName = row["similar_school_" + _i + "_name"];
        if (_simName) {
          const _sim = state.datasets.schools.find((s) => getSchoolName(s) === _simName);
          if (_sim) {
            _enrichedRow["similar_school_" + _i + "_nearest_park_dist_m"] = _sim.nearest_park_dist_m;
            _enrichedRow["similar_school_" + _i + "_iso_green_ratio"] = _sim.iso_green_ratio;
            _enrichedRow["similar_school_" + _i + "_iso_playground_count"] = _sim.iso_playground_count;
          }
        }
      }

      _legacySnapshot = buildLegacySchoolSnapshot(_enrichedRow);
      _enrichedRow._legacySnapshot = _legacySnapshot;
      _enrichedRow._legacySnapshotLog = {
        school_id: _legacySnapshot.school_id,
        missing_fields: _legacySnapshot.legacy_missing_fields || [],
      };

      const _safeAvg = (rows, key) => {
        const values = rows
          .map((item) => Number(item[key]))
          .filter((value) => Number.isFinite(value));
        if (!values.length) return 0;
        return values.reduce((sum, value) => sum + value, 0) / values.length;
      };

      const _shareGe = (rows, key, value) => {
        const values = rows
          .map((item) => Number(item[key]))
          .filter((num) => Number.isFinite(num));
        if (!values.length || !Number.isFinite(Number(value))) return null;
        return Math.round((values.filter((num) => num >= Number(value)).length / values.length) * 1000) / 10;
      };

      const _shareLe = (rows, key, value) => {
        const values = rows
          .map((item) => Number(item[key]))
          .filter((num) => Number.isFinite(num));
        if (!values.length || !Number.isFinite(Number(value))) return null;
        return Math.round((values.filter((num) => num <= Number(value)).length / values.length) * 1000) / 10;
      };

      const _shareLt = (rows, key, value) => {
        const values = rows
          .map((item) => Number(item[key]))
          .filter((num) => Number.isFinite(num));
        if (!values.length || !Number.isFinite(Number(value))) return null;
        return Math.round((values.filter((num) => num < Number(value)).length / values.length) * 1000) / 10;
      };

      const _buildZeroInflatedStats = (rows, key, value) => {
        const values = rows
          .map((item) => Number(item[key]))
          .filter((num) => Number.isFinite(num));
        if (!values.length || !Number.isFinite(Number(value))) {
          return {
            zeroShare: null,
            nonZeroPercentile: null,
            nonZeroAvg: null,
            isZero: null,
            nonZeroCount: 0,
            totalCount: values.length
          };
        }

        const zeroCount = values.filter((num) => num === 0).length;
        const nonZeroValues = values.filter((num) => num > 0);
        const numericValue = Number(value);
        const isZero = numericValue === 0;

        if (!nonZeroValues.length) {
          return {
            zeroShare: Math.round((zeroCount / values.length) * 1000) / 10,
            nonZeroPercentile: null,
            nonZeroAvg: null,
            isZero,
            nonZeroCount: 0,
            totalCount: values.length
          };
        }

        const nonZeroAvg = nonZeroValues.reduce((sum, num) => sum + num, 0) / nonZeroValues.length;
        const nonZeroPercentile = isZero
          ? null
          : Math.round((nonZeroValues.filter((num) => num >= numericValue).length / nonZeroValues.length) * 1000) / 10;

        return {
          zeroShare: Math.round((zeroCount / values.length) * 1000) / 10,
          nonZeroPercentile,
          nonZeroAvg,
          isZero,
          nonZeroCount: nonZeroValues.length,
          totalCount: values.length
        };
      };

      const _lastStudentCount = (school) => {
        const trend = Array.isArray(school.studentTrend) ? school.studentTrend : [];
        if (!trend.length) return Number(school.predicted_current) || null;
        const sorted = trend
          .filter((item) => Number.isFinite(Number(item.students)) || Number.isFinite(Number(item.value)))
          .sort((a, b) => Number(a.year) - Number(b.year));
        if (!sorted.length) return Number(school.predicted_current) || null;
        const last = sorted[sorted.length - 1];
        const count = Number(last.students ?? last.value);
        return Number.isFinite(count) ? count : Number(school.predicted_current) || null;
      };

      const _allSchools = state.datasets.schools || [];
      const _validSchools = _allSchools.filter((s) => Number.isFinite(Number(s.nearest_park_dist_m)) && Number(s.nearest_park_dist_m) > 0);
      const _cityAvg = {
        nearestParkDistanceM: _safeAvg(_validSchools, "nearest_park_dist_m"),
        greenRatio: _safeAvg(_allSchools, "iso_green_ratio"),
        playgroundCount: _safeAvg(_allSchools, "iso_playground_count"),
        studentTrendPct: _safeAvg(
          _allSchools.map((school) => {
            const trend = Array.isArray(school.studentTrend) ? school.studentTrend : [];
            if (trend.length < 2) return null;
            const first = Number(trend[0].students ?? trend[0].value);
            const last = Number(trend[trend.length - 1].students ?? trend[trend.length - 1].value);
            if (!Number.isFinite(first) || !Number.isFinite(last) || first <= 0) return null;
            return { studentTrendPct: ((last - first) / first) * 100 };
          }).filter(Boolean),
          "studentTrendPct"
        ),
      };
      _enrichedRow._cityAvg = _cityAvg;

      _enrichedRow.nearestParkDistanceCityPercentile = _shareGe(_validSchools, "nearest_park_dist_m", row.nearest_park_dist_m);
      _enrichedRow.greenRatioCityPercentile = _shareLe(_allSchools, "iso_green_ratio", row.iso_green_ratio);
      _enrichedRow.greenRatioCityPercentile_lt = _shareLt(_allSchools, "iso_green_ratio", row.iso_green_ratio);
      _enrichedRow.playgroundCountCityPercentile = _shareLe(_allSchools, "iso_playground_count", row.iso_playground_count);
      _enrichedRow.playgroundCountCityPercentile_lt = _shareLt(_allSchools, "iso_playground_count", row.iso_playground_count);
      const _cityGreenZeroStats = _buildZeroInflatedStats(_allSchools, "iso_green_ratio", row.iso_green_ratio);
      const _cityPlaygroundZeroStats = _buildZeroInflatedStats(_allSchools, "iso_playground_count", row.iso_playground_count);
      _enrichedRow.greenRatioCityZeroShare = _cityGreenZeroStats.zeroShare;
      _enrichedRow.greenRatioCityNonZeroPercentile = _cityGreenZeroStats.nonZeroPercentile;
      _enrichedRow.greenRatioCityNonZeroAvg = _cityGreenZeroStats.nonZeroAvg;
      _enrichedRow.playgroundCountCityZeroShare = _cityPlaygroundZeroStats.zeroShare;
      _enrichedRow.playgroundCountCityNonZeroPercentile = _cityPlaygroundZeroStats.nonZeroPercentile;
      _enrichedRow.playgroundCountCityNonZeroAvg = _cityPlaygroundZeroStats.nonZeroAvg;
      const _cityStudentCounts = _allSchools.map((school) => _lastStudentCount(school)).filter((value) => Number.isFinite(value));
      const _currentStudentCount = _lastStudentCount(row);
      _enrichedRow.currentStudentCountCityPercentile = _cityStudentCounts.length && Number.isFinite(_currentStudentCount)
        ? Math.round((_cityStudentCounts.filter((value) => value >= _currentStudentCount).length / _cityStudentCounts.length) * 1000) / 10
        : null;

      const _isSuspiciousGreenSchool = (school) => {
        const green = Number(school.iso_green_ratio) || 0;
        const playground = Number(school.iso_playground_count) || 0;
        const parkCount = Number(school.iso_park_count) || 0;
        const parkDist = Number(school.nearest_park_dist_m) || 0;
        return (
          (green >= 40 && playground === 0) ||
          (green >= 25 && parkDist > 350) ||
          (green >= 20 && playground === 0 && parkCount <= 1)
        );
      };

      const _scoreBestEnvironmentSchool = (rows) => {
        const valid = rows.filter((school) => Number.isFinite(Number(school.nearest_park_dist_m)) && Number.isFinite(Number(school.iso_green_ratio)));
        const candidates = valid.filter((school) => Number(school.nearest_park_dist_m) <= 200);
        if (!candidates.length) return [];

        const _quartileCutoffs = (values) => {
          const sorted = values
            .map((value) => Number(value))
            .filter((value) => Number.isFinite(value))
            .sort((a, b) => a - b);
          if (!sorted.length) return { q1: null, q2: null, q3: null };
          const _pick = (ratio) => {
            const idx = (sorted.length - 1) * ratio;
            const lo = Math.floor(idx);
            const hi = Math.ceil(idx);
            if (lo === hi) return sorted[lo];
            const weight = idx - lo;
            return sorted[lo] * (1 - weight) + sorted[hi] * weight;
          };
          return { q1: _pick(0.25), q2: _pick(0.5), q3: _pick(0.75) };
        };
        const _assignQuartile = (value, cutoffs) => {
          const num = Number(value);
          if (!Number.isFinite(num) || cutoffs.q1 == null || cutoffs.q2 == null || cutoffs.q3 == null) return 0;
          if (num >= cutoffs.q3) return 4;
          if (num >= cutoffs.q2) return 3;
          if (num >= cutoffs.q1) return 2;
          return 1;
        };

        const greenCutoffs = _quartileCutoffs(valid.map((school) => school.iso_green_ratio));
        return candidates
          .map((school) => ({
            school,
            quartile: _assignQuartile(school.iso_green_ratio, greenCutoffs),
            playgroundFlag: Number(school.iso_playground_count) >= 1 ? 1 : 0,
            greenRatio: Number(school.iso_green_ratio) || 0,
            parkDistance: Number(school.nearest_park_dist_m) || 0,
          }))
          .sort((a, b) =>
            b.quartile - a.quartile ||
            b.playgroundFlag - a.playgroundFlag ||
            b.greenRatio - a.greenRatio ||
            a.parkDistance - b.parkDistance
          );
      };

      const _cityBest = (_scoreBestEnvironmentSchool(_allSchools)[0] || {}).school;
      if (_cityBest) {
        _enrichedRow._cityBest = {
          schoolName: getSchoolName(_cityBest),
          districtName: "인천광역시 " + (detectGu(_cityBest) || ""),
          nearestParkDistanceM: Number(_cityBest.nearest_park_dist_m),
          greenRatio: Number(_cityBest.iso_green_ratio) || 0,
          playgroundCount: Number(_cityBest.iso_playground_count) || 0,
        };
      }

      // 구 최우수 학교
      if (_gu) {
        const _districtRows = _allSchools.filter((s) => (detectGu(s) || "") === _gu);
        _enrichedRow._districtAvg = {
          nearestParkDistanceM: _safeAvg(_districtRows.filter((s) => Number.isFinite(Number(s.nearest_park_dist_m)) && Number(s.nearest_park_dist_m) > 0), "nearest_park_dist_m"),
          greenRatio: _safeAvg(_districtRows, "iso_green_ratio"),
          playgroundCount: _safeAvg(_districtRows, "iso_playground_count"),
          studentTrendPct: _safeAvg(
            _districtRows.map((school) => {
              const trend = Array.isArray(school.studentTrend) ? school.studentTrend : [];
              if (trend.length < 2) return null;
              const first = Number(trend[0].students ?? trend[0].value);
              const last = Number(trend[trend.length - 1].students ?? trend[trend.length - 1].value);
              if (!Number.isFinite(first) || !Number.isFinite(last) || first <= 0) return null;
              return { studentTrendPct: ((last - first) / first) * 100 };
            }).filter(Boolean),
            "studentTrendPct"
          ),
        };
        const _validDistrictSchools = _districtRows.filter((s) => Number.isFinite(Number(s.nearest_park_dist_m)) && Number(s.nearest_park_dist_m) > 0);
        _enrichedRow.nearestParkDistanceDistrictPercentile = _shareGe(_validDistrictSchools, "nearest_park_dist_m", row.nearest_park_dist_m);
        _enrichedRow.greenRatioDistrictPercentile = _shareLe(_districtRows, "iso_green_ratio", row.iso_green_ratio);
        _enrichedRow.greenRatioDistrictPercentile_lt = _shareLt(_districtRows, "iso_green_ratio", row.iso_green_ratio);
        _enrichedRow.playgroundCountDistrictPercentile = _shareLe(_districtRows, "iso_playground_count", row.iso_playground_count);
        _enrichedRow.playgroundCountDistrictPercentile_lt = _shareLt(_districtRows, "iso_playground_count", row.iso_playground_count);
        const _districtGreenZeroStats = _buildZeroInflatedStats(_districtRows, "iso_green_ratio", row.iso_green_ratio);
        const _districtPlaygroundZeroStats = _buildZeroInflatedStats(_districtRows, "iso_playground_count", row.iso_playground_count);
        _enrichedRow.greenRatioDistrictZeroShare = _districtGreenZeroStats.zeroShare;
        _enrichedRow.greenRatioDistrictNonZeroPercentile = _districtGreenZeroStats.nonZeroPercentile;
        _enrichedRow.greenRatioDistrictNonZeroAvg = _districtGreenZeroStats.nonZeroAvg;
        _enrichedRow.playgroundCountDistrictZeroShare = _districtPlaygroundZeroStats.zeroShare;
        _enrichedRow.playgroundCountDistrictNonZeroPercentile = _districtPlaygroundZeroStats.nonZeroPercentile;
        _enrichedRow.playgroundCountDistrictNonZeroAvg = _districtPlaygroundZeroStats.nonZeroAvg;
        const _districtStudentCounts = _districtRows.map((school) => _lastStudentCount(school)).filter((value) => Number.isFinite(value));
        _enrichedRow.currentStudentCountDistrictPercentile = _districtStudentCounts.length && Number.isFinite(_currentStudentCount)
          ? Math.round((_districtStudentCounts.filter((value) => value >= _currentStudentCount).length / _districtStudentCounts.length) * 1000) / 10
          : null;
        const _distBest = (_scoreBestEnvironmentSchool(_districtRows)[0] || {}).school;
        if (_distBest) {
          _enrichedRow._districtBest = {
            schoolName: getSchoolName(_distBest),
            districtName: "인천광역시 " + _gu,
            nearestParkDistanceM: Number(_distBest.nearest_park_dist_m),
            greenRatio: Number(_distBest.iso_green_ratio) || 0,
            playgroundCount: Number(_distBest.iso_playground_count) || 0,
          };
        }
      }

      _enrichedRow._redevelopmentProjects = buildRedevelopmentProjectList(row, 500);
      _enrichedRow._largeApartmentComplexes = buildLargeApartmentComplexList(row, 500, 500);

      localStorage.setItem("parkAnalysis_school", JSON.stringify(_enrichedRow));
      localStorage.setItem("parkAnalysis_legacySnapshotLog", JSON.stringify(_enrichedRow._legacySnapshotLog));
      const _schoolName = getSchoolName(row);
      const _linkedCandidates = (state.datasets.candidateFeatures || [])
        .filter((p) => Array.isArray(p.linked_schools) && p.linked_schools.includes(_schoolName))
        .slice(0, 20);
      localStorage.setItem("parkAnalysis_candidates", JSON.stringify(_linkedCandidates));

      // 클릭과 동시에 상세 리포트 오버레이 자동 열기
      openSimulationOverlay();
    }

    async function init() {
      try {
        await loadKakaoMapSdk();
      } catch (error) {
        console.error("[kakao-sdk]", error);
        setStatus("카카오맵 SDK 로딩에 실패했습니다. API 키와 네트워크 상태를 확인하세요.");
        return;
      }

      state.map = new kakao.maps.Map(document.getElementById("map"), {
        center: new kakao.maps.LatLng(INCHEON_CENTER.lat, INCHEON_CENTER.lng),
        level: DEFAULT_LEVEL
      });

      state.clusterer = new kakao.maps.MarkerClusterer({
        map: state.map,
        averageCenter: true,
        minLevel: 1,
        disableClickZoom: true,
        styles: [
          {
            width: "44px",
            height: "44px",
            background: "rgba(20, 83, 45, 0.88)",
            borderRadius: "22px",
            color: "#fff",
            textAlign: "center",
            fontWeight: "800",
            lineHeight: "44px",
            border: "2px solid rgba(255,255,255,0.9)"
          }
        ]
      });
      kakao.maps.event.addListener(state.clusterer, "clusterclick", (cluster) => {
        state.map.setLevel(Math.max(state.map.getLevel() - 1, 1), { anchor: cluster.getCenter() });
      });
      state.infoWindow = new kakao.maps.InfoWindow({ removable: true });
      refreshLegend();
      wireEvents();
      await loadData();
      loadCandidateLayer();
    }

    init();

    /* ── 시뮬레이션 오버레이 ──────────────────────────── */
    function openSimulationOverlay() {
      document.getElementById("simulationOverlay").style.display = "flex";
      const frame = document.getElementById("simulationFrame");
      frame.src = "ui-preview/dist/index.html?t=" + Date.now();
    }
    function closeSimulationOverlay() {
      document.getElementById("simulationOverlay").style.display = "none";
      const frame = document.getElementById("simulationFrame");
      frame.src = frame.src; // iframe 리셋
    }
  </script>

  <!-- 시뮬레이션 전체화면 오버레이 -->
  <div id="simulationOverlay" style="
    display:none; position:fixed; inset:0; z-index:10000;
    background:rgba(0,0,0,0.6);
    align-items:center; justify-content:center;
  ">
    <div style="
      position:relative; width:min(1080px,98vw); height:92vh;
      background:#fff; border-radius:16px; overflow:hidden;
      box-shadow:0 24px 64px rgba(0,0,0,0.4);
    ">
      <button
        onclick="closeSimulationOverlay()"
        style="
          position:absolute; top:12px; right:14px; z-index:1;
          background:#f0f0f0; border:none; border-radius:8px;
          padding:6px 14px; cursor:pointer; font-size:13px; font-weight:600;
        "
      >✕ 닫기</button>
      <iframe
        id="simulationFrame"
        src="ui-preview/dist/index.html"
        style="width:100%; height:100%; border:none;"
        title="후보지 시뮬레이션"
      ></iframe>
    </div>
  </div>
</body>
