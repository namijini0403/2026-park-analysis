<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>인천 초등학교 아동 야외활동 환경 격차 지도</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg: #f3efe4;
      --panel: rgba(255, 251, 243, 0.96);
      --panel-border: rgba(110, 89, 51, 0.18);
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #14532d;
      --accent-soft: #d9ead3;
      --danger: #e53e3e;
      --warning: #ed8936;
      --success: #38a169;
      --shadow: 0 18px 48px rgba(61, 42, 20, 0.16);
      --radius: 22px;
      --touch: 44px;
      --sidebar-width: min(360px, calc(100vw - 36px));
      --sidebar-gap: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 232, 186, 0.9), transparent 28%),
        radial-gradient(circle at top right, rgba(193, 232, 201, 0.8), transparent 26%),
        linear-gradient(180deg, #f9f4ea 0%, #f0ece3 100%);
    }

    body {
      overflow: hidden;
    }

    .app-shell {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .panel {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 20;
      width: min(360px, calc(100vw - 36px));
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 20px 10px;
      border-bottom: 1px solid rgba(110, 89, 51, 0.09);
      background: linear-gradient(135deg, rgba(243, 223, 180, 0.4), rgba(210, 233, 216, 0.45));
    }

    .eyebrow {
      margin: 0 0 6px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7c5c27;
      font-weight: 700;
    }

    .panel-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .panel-subtitle {
      margin: 8px 0 0;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .panel-body {
      padding: 16px 18px 18px;
      padding-bottom: 140px;
      max-height: calc(100vh - 60px);
      overflow: auto;
    }

    .map-search-box {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 26;
      width: min(320px, calc(100vw - var(--sidebar-width) - 54px));
      padding: 10px 12px;
      border-radius: 18px;
      background: rgba(255, 251, 243, 0.94);
      border: 1px solid rgba(110, 89, 51, 0.14);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .map-search-label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 800;
      color: #7c5c27;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .map-search-input {
      width: 100%;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(99, 78, 40, 0.16);
      background: #ffffff;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      outline: none;
    }

    .map-search-input:focus {
      border-color: rgba(20, 83, 45, 0.38);
      box-shadow: 0 0 0 3px rgba(20, 83, 45, 0.08);
    }

    .section {
      margin-bottom: 18px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 800;
      color: #775f34;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    select, .toggle-row {
      min-height: var(--touch);
    }

    select {
      width: 100%;
      border: 1px solid rgba(99, 78, 40, 0.18);
      border-radius: 14px;
      background: #fffdfa;
      padding: 10px 14px;
      font-size: 15px;
      color: var(--text);
      outline: none;
    }

    .toggle-list {
      display: grid;
      gap: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(99, 78, 40, 0.12);
    }

    .toggle-row input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .toggle-row label {
      flex: 1;
      font-size: 15px;
      cursor: pointer;
    }

    .legend {
      display: grid;
      gap: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: var(--touch);
      padding: 8px 0;
      font-size: 14px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex: 0 0 auto;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.75);
    }

    .status-box {
      min-height: 92px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #fffdfa;
      border: 1px dashed rgba(99, 78, 40, 0.2);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .summary-box {
      min-height: 120px;
      max-height: 320px;
      padding: 14px;
      position: relative;
      z-index: 2;
      border-radius: 16px;
      background: #fffdfa;
      border: 1px solid rgba(99, 78, 40, 0.16);
      font-size: 13px;
      line-height: 1.7;
      white-space: normal;
      word-break: break-word;
      overflow-y: auto;
    }

    .summary-grid {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .summary-list {
      display: grid;
      gap: 6px;
    }

    .school-detail-box {
      min-height: 280px;
      padding: 16px;
      border-radius: 18px;
      background: #fffdfa;
      border: 1px solid rgba(99, 78, 40, 0.16);
      font-size: 13px;
      line-height: 1.7;
      white-space: normal;
      word-break: break-word;
    }

    .school-detail-box.case-case1 {
      background: #fff1f1;
      border-color: rgba(229, 62, 62, 0.24);
    }

    .school-detail-box.case-case4 {
      color: var(--muted);
    }

    .school-detail-box.case-island {
      background: #eef5ff;
      border-color: rgba(30, 136, 229, 0.24);
    }

    .detail-head {
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(99, 78, 40, 0.12);
    }

    .detail-name {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .detail-subtitle {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    .detail-badge {
      display: inline-flex;
      align-items: center;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .detail-badge.immediate {
      color: #ffffff;
      background: #6b46c1;
    }

    .detail-badge.critical {
      color: #ffffff;
      background: #c53030;
    }

    .detail-badge.high {
      color: #7b341e;
      background: #f6ad55;
    }

    .detail-badge.watch {
      color: #744210;
      background: #f6e05e;
    }

    .detail-badge.normal {
      color: #ffffff;
      background: #2f855a;
    }

    .detail-badge.island {
      color: #ffffff;
      background: #1e88e5;
    }

    .detail-badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .detail-message-extra {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #6b46c1;
    }

    .detail-badge.warning {
      color: #7b341e;
      background: #fbd38d;
    }

    .detail-badge.neutral {
      color: #4b5563;
      background: #e5e7eb;
    }

    .detail-badge.success {
      color: #ffffff;
      background: #2f855a;
    }

    .detail-message {
      margin: 0 0 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(217, 234, 211, 0.32);
      border: 1px solid rgba(20, 83, 45, 0.12);
    }

    .detail-message.case-case2 {
      background: rgba(255, 243, 224, 0.9);
      border-color: rgba(251, 140, 0, 0.22);
    }

    .detail-message.case-case1 {
      background: rgba(255, 235, 238, 0.95);
      border-color: rgba(229, 57, 53, 0.28);
    }

    .detail-message.case-case3 {
      background: rgba(255, 249, 196, 0.9);
      border-color: rgba(253, 216, 53, 0.28);
    }

    .detail-message.case-island {
      background: rgba(227, 242, 253, 0.95);
      border-color: rgba(30, 136, 229, 0.28);
    }

    .detail-section {
      margin-top: 14px;
    }

    .detail-section-title {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #7c5c27;
    }

    .metric-list {
      display: grid;
      gap: 8px;
    }

    .metric-item {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(99, 78, 40, 0.1);
    }

    .metric-item.muted {
      color: var(--muted);
      background: rgba(243, 244, 246, 0.72);
    }

    .metric-item.warning {
      color: #9c4221;
      background: rgba(254, 235, 200, 0.9);
      border-color: rgba(237, 137, 54, 0.2);
      font-weight: 700;
    }

    .metric-item.danger {
      color: #9b2c2c;
      background: rgba(254, 226, 226, 0.92);
      border-color: rgba(229, 62, 62, 0.24);
      font-weight: 800;
    }

    .metric-item.success {
      color: #22543d;
      background: rgba(198, 246, 213, 0.9);
      border-color: rgba(47, 133, 90, 0.22);
      font-weight: 700;
    }

    .trend-card {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(99, 78, 40, 0.1);
    }

    .trend-bars {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      min-height: 72px;
      margin: 8px 0 6px;
    }

    .trend-bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .trend-bar {
      width: 18px;
      min-height: 18px;
      border-radius: 6px 6px 3px 3px;
      background: linear-gradient(180deg, #2f855a 0%, #68d391 100%);
    }

    .trend-year {
      font-size: 10px;
      color: #4b5563;
    }

    .trend-labels {
      font-size: 11px;
      color: #4b5563;
    }

    .redevelopment-list {
      display: grid;
      gap: 8px;
    }

    .redevelopment-item {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(99, 78, 40, 0.1);
    }

    .redevelopment-item.critical {
      border: 2px solid #e03c31;
      background: rgba(254, 226, 226, 0.88);
    }

    .redevelopment-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .redevelopment-name {
      font-weight: 800;
      color: #1f2937;
      word-break: break-word;
    }

    .redevelopment-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
    }

    .redevelopment-stage-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
      border: 1px solid transparent;
    }

    .redevelopment-stage-badge.gray {
      background: rgba(158, 158, 158, 0.16);
      color: #616161;
    }

    .redevelopment-stage-badge.blue {
      background: rgba(92, 155, 214, 0.16);
      color: #336b9b;
    }

    .redevelopment-stage-badge.orange {
      background: rgba(240, 165, 0, 0.16);
      color: #9a6700;
    }

    .redevelopment-stage-badge.red {
      background: rgba(224, 60, 49, 0.12);
      color: #b1261e;
      border-color: rgba(224, 60, 49, 0.5);
      font-weight: 900;
    }

    .redevelopment-distance {
      color: #4b5563;
      font-weight: 700;
      white-space: nowrap;
    }

    .detail-score {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255, 247, 237, 0.9);
      border: 1px solid rgba(237, 137, 54, 0.2);
      font-weight: 800;
    }

    .panel-util {
      display: none;
    }

    .school-link {
      width: 100%;
      position: relative;
      z-index: 3;
      text-align: left;
      border: 1px solid rgba(99, 78, 40, 0.16);
      border-radius: 12px;
      background: rgba(217, 234, 211, 0.35);
      padding: 8px 10px;
      font: inherit;
      color: var(--text);
      cursor: pointer;
    }

    .school-link:hover {
      background: rgba(217, 234, 211, 0.6);
    }

    .mobile-handle {
      display: none;
      width: 48px;
      height: 5px;
      border-radius: 999px;
      background: rgba(73, 54, 21, 0.2);
      margin: 0 auto 12px;
    }

    .floating-button {
      display: none;
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 30;
      min-width: var(--touch);
      min-height: var(--touch);
      padding: 0 16px;
      border: 0;
      border-radius: 999px;
      background: #1f5136;
      color: white;
      font-size: 14px;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .layer-toggle-bar {
      position: absolute;
      left: 18px;
      right: calc(var(--sidebar-width) + var(--sidebar-gap) + 18px);
      bottom: 18px;
      z-index: 25;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: stretch;
      justify-content: flex-start;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 251, 243, 0.92);
      border: 1px solid rgba(110, 89, 51, 0.14);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      max-width: calc(100vw - var(--sidebar-width) - var(--sidebar-gap) - 36px);
    }

    .layer-toggle-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 1 auto;
      gap: 8px;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(99, 78, 40, 0.14);
      background: #ffffff;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease, color 0.18s ease;
    }

    .layer-toggle-btn:hover {
      transform: translateY(-1px);
    }

    .layer-toggle-btn.is-on[data-layer="isochrone"] {
      background: rgba(16, 185, 129, 0.16);
      border-color: rgba(16, 185, 129, 0.38);
      color: #065f46;
    }

    .layer-toggle-btn.is-on[data-layer="buffer"] {
      background: rgba(59, 130, 246, 0.14);
      border-color: rgba(59, 130, 246, 0.34);
      color: #1d4ed8;
    }

    .layer-toggle-btn.is-on[data-layer="parks"] {
      background: rgba(34, 197, 94, 0.14);
      border-color: rgba(34, 197, 94, 0.34);
      color: #166534;
    }

    .layer-toggle-btn.is-on[data-layer="redevelopment"] {
      background: rgba(245, 158, 11, 0.16);
      border-color: rgba(245, 158, 11, 0.34);
      color: #92400e;
    }

    .layer-toggle-btn.is-on[data-layer="childcare"] {
      background: rgba(168, 85, 247, 0.14);
      border-color: rgba(168, 85, 247, 0.34);
      color: #7c3aed;
    }

    .layer-toggle-btn.is-on[data-layer="candidate"] {
      background: rgba(231, 76, 60, 0.14);
      border-color: rgba(231, 76, 60, 0.34);
      color: #b91c1c;
    }

    @media (max-width: 768px) {
      .panel {
        top: auto;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        max-width: none;
        border-radius: 24px 24px 0 0;
        transform: translateY(calc(100% - 118px));
        transition: transform 0.28s ease;
      }

      .panel.open {
        transform: translateY(0);
      }

      .mobile-handle {
        display: block;
      }

      .panel-body {
        max-height: 52vh;
        padding-top: 2px;
      }

      .floating-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .layer-toggle-bar {
        left: 12px;
        right: 12px;
        bottom: 74px;
        gap: 8px;
        padding: 10px;
        max-width: none;
      }

      .map-search-box {
        top: 12px;
        left: 12px;
        width: calc(100vw - 24px);
      }

      .layer-toggle-btn {
        flex: 1 1 calc(50% - 8px);
        font-size: 13px;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="map"></div>

    <div class="map-search-box" aria-label="학교 검색">
      <label class="map-search-label" for="schoolSearchInput">학교 검색</label>
      <input class="map-search-input" id="schoolSearchInput" type="search" list="schoolSearchList" placeholder="학교명을 입력하세요" autocomplete="off" />
      <datalist id="schoolSearchList"></datalist>
    </div>

    <button class="floating-button" id="panelToggleButton" type="button">필터 열기</button>

    <div class="layer-toggle-bar" id="layerToggleBar" aria-label="지도 레이어 토글">
      <button class="layer-toggle-btn" type="button" data-layer="isochrone">🚶 실제 도보이동 500m</button>
      <button class="layer-toggle-btn" type="button" data-layer="buffer">⭕ 직선거리 500m</button>
      <button class="layer-toggle-btn" type="button" data-layer="parks">🌳 공원·놀이터</button>
      <button class="layer-toggle-btn" type="button" data-layer="redevelopment">🏗️ 재개발</button>
      <button class="layer-toggle-btn" type="button" data-layer="childcare">🏫 어린이집·유치원</button>
      <button class="layer-toggle-btn" type="button" data-layer="candidate">📍 후보지</button>
    </div>

    <aside class="panel" id="controlPanel">
      <div class="panel-header">
        <div class="mobile-handle"></div>
        <p class="eyebrow">Incheon Outdoor Equity</p>
        <h1 class="panel-title">초등학교 야외활동 환경 격차 지도</h1>
        <p class="panel-subtitle">구 전체 현황과 학교별 진단을 한 화면에서 확인합니다.</p>
      </div>

      <div class="panel-body">
        <section class="section">
          <h2 class="section-title">구 선택</h2>
          <label class="field-label" for="guFilter">구 선택</label>
          <select id="guFilter">
            <option value="전체">전체</option>
            <option value="미추홀구">미추홀구</option>
            <option value="서구">서구</option>
            <option value="남동구">남동구</option>
            <option value="계양구">계양구</option>
            <option value="연수구">연수구</option>
            <option value="중구">중구</option>
            <option value="동구">동구</option>
            <option value="강화군">강화군</option>
            <option value="옹진군">옹진군</option>
          </select>
        </section>

        <section class="section">
          <h2 class="section-title">구 전체 통계</h2>
          <div class="summary-box" id="guSummaryBox">구를 선택하면 요약을 표시합니다.</div>
        </section>

        <section class="section">
          <h2 class="section-title">학교 상세</h2>
          <div class="school-detail-box" id="schoolDetailBox">학교 마커를 클릭하면 상세 정보를 표시합니다.</div>
        </section>

        <div class="panel-util" aria-hidden="true">
          <section class="section">
            <div class="toggle-list">
              <div class="toggle-row">
                <input type="checkbox" id="toggleIsochrone" />
                <label for="toggleIsochrone">도보 등시선</label>
              </div>
              <div class="toggle-row">
                <input type="checkbox" id="toggleBuffer" />

    function populateSchoolSearchOptions() {
      if (!ui.schoolSearchList) return;
      const seen = new Set();
      const rows = [...state.datasets.schools].sort((a, b) => getSchoolName(a).localeCompare(getSchoolName(b), "ko"));
      ui.schoolSearchList.innerHTML = rows
        .map((row) => {
          const schoolName = getSchoolName(row);
          if (!schoolName || seen.has(schoolName)) return "";
          seen.add(schoolName);
          return `<option value="${schoolName}"></option>`;
        })
        .join("");
    }

    function findSchoolBySearch(query) {
      const keyword = String(query || "").trim();
      if (!keyword) return null;

      const exact = state.datasets.schools.find((row) => getSchoolName(row) === keyword);
      if (exact) return exact;

      const partial = state.datasets.schools.find((row) => getSchoolName(row).includes(keyword));
      return partial || null;
    }

      if (!row || !state.map) return;
      const latLng = toLatLng(row, row["?꾨룄"] !== undefined ? "?꾨룄" : "lat", row["寃쎈룄"] !== undefined ? "寃쎈룄" : "lng");
      if (!latLng) return;

      highlightIsochroneForSchool(row);
      setSchoolPanelSelection(row);
      renderDetailPanel(row);
      state.map.setLevel(5);
      state.map.panTo(latLng);
      state.infoWindow.close();
      openPanel();

    function openSchoolPanel(row) {
      if (!row || !state.map) return;
      const latLng = toLatLng(
        row,
        row["위도"] !== undefined ? "위도" : "lat",
        row["경도"] !== undefined ? "경도" : "lng"
      );
      if (!latLng) return;

      highlightIsochroneForSchool(row);
      setSchoolPanelSelection(row);
      renderDetailPanel(row);
      state.map.setLevel(5);
      state.map.panTo(latLng);
      state.infoWindow.close();
      openPanel();
      pulseSchoolMarker(getSchoolId(row));
    }

    function pulseSchoolMarker(schoolId) {
      if (!schoolId) return;
      const marker = state.schoolMarkerIndex.get(schoolId);
      if (!marker) return;
      const row = marker.__schoolRow || state.datasets.schools.find((item) => getSchoolId(item) === schoolId);
      if (!row) return;

      if (marker.__pulseTimeout) {
        clearTimeout(marker.__pulseTimeout);
      }

      const markerStyle = getMarkerStyle(row);
      marker.setImage(
        createMarkerImage(
          markerStyle.color,
          markerStyle.symbol,
          markerStyle.borderColor,
          { size: 45, outerBorderColor: "#FFFFFF", outerBorderWidth: 3 }
        )
      );

      marker.__pulseTimeout = setTimeout(() => {
        const resetStyle = getMarkerStyle(row);
        marker.setImage(
          createMarkerImage(resetStyle.color, resetStyle.symbol, resetStyle.borderColor)
        );
        marker.__pulseTimeout = null;
      }, 500);
    }

      if (ui.guFilter && detectGu(row)) {

        rerenderAll();

      openSchoolPanel(row);

    function loadCSV(path) {
      return new Promise((resolve) => {
        Papa.parse(path, {
          download: true,
          header: true,
          skipEmptyLines: true,
          complete: (results) => {
            if (results.errors && results.errors.length) {
              console.error(`[loadCSV] ${path}`, results.errors);
            }
            resolve(results.data || []);
          },
          error: (error) => {
            console.error(`[loadCSV] ${path}`, error);
            resolve([]);
          }
        });
      });
    }

    async function loadGeoJSON(path) {
      try {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return await response.json();
      } catch (error) {
        console.error(`[loadGeoJSON] ${path}`, error);
        return null;
      }
    }

    async function loadJSON(path) {
      try {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return await response.json();
      } catch (error) {
        console.error(`[loadJSON] ${path}`, error);
        return null;
      }
    }

    async function loadCandidateExamples() {
      const examples = await loadJSON(PATHS.candidatePanelExamples);

        }

        const script = document.createElement("script");
        script.src = `https://dapi.kakao.com/v2/maps/sdk.js?autoload=false&appkey=${window.KAKAO_MAP_KEY}&libraries=clusterer`;
        script.onload = () => {
          if (!window.kakao || !window.kakao.maps) {
            reject(new Error("카카오맵 객체가 초기화되지 않았습니다."));
            return;
          }
          window.kakao.maps.load(resolve);
        };
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    function createMarkerImage(color, symbol = "", borderColor = "", options = {}) {
      const size = Number(options.size || 30);
      const center = size / 2;
      const outerRadius = size * 0.4167;
      const innerRadius = size * 0.3667;
      const dotRadius = size * 0.1333;
      const outerBorderColor = options.outerBorderColor || "";
      const outerBorderWidth = Number(options.outerBorderWidth || 0);
      const inner = symbol
        ? `<text x="${center}" y="${center + size * 0.1333}" text-anchor="middle" font-size="${size * 0.4}" font-weight="800" fill="#ffffff">${symbol}</text>`
        : `<circle cx="${center}" cy="${center}" r="${dotRadius}" fill="#ffffff" fill-opacity="0.95" />`;
      const outerStroke = outerBorderColor
        ? `<circle cx="${center}" cy="${center}" r="${outerRadius + 2}" fill="none" stroke="${outerBorderColor}" stroke-width="${outerBorderWidth || 3}" />`
        : "";
      const stroke = borderColor
        ? `<circle cx="${center}" cy="${center}" r="${outerRadius}" fill="none" stroke="${borderColor}" stroke-width="3" />`
        : "";
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
          ${outerStroke}
          ${stroke}
          <circle cx="${center}" cy="${center}" r="${innerRadius}" fill="${color}" fill-opacity="0.95" />
          ${inner}
        </svg>
      `.trim();

      return new kakao.maps.MarkerImage(
        `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`,
        new kakao.maps.Size(size, size),
        { offset: new kakao.maps.Point(center, center) }
      );
    }

    function getOutlierType(row = {}) {
      const value = String(row.outlier_type || "").trim().toLowerCase();
      return value === "착시" ? value : "";
    }

    function getMarkerStyle(row = {}) {
      const outlierType = getOutlierType(row);
      const caseType = Number(row.case_type);
      const borderColor = outlierType === "착시" ? "#6B46C1" : "";
      if (caseType === 3) return { color: "#E53E3E", symbol: "", borderColor };
      if (caseType === 2) return { color: "#ED8936", symbol: "", borderColor };
      if (caseType === 1) return { color: "#F6E05E", symbol: "", borderColor };
      return { color: "#38A169", symbol: "", borderColor };
    }

    function detectGu(row) {
      return (
        row.gu ||
        row["구"] ||
        row["구명"] ||
        row["행정구역"] ||
        extractGuFromAddress(row["소재지도로명주소"] || row["주소"] || row["위치"] || "")
      );
    }

    function extractGuFromAddress(text) {
      const source = String(text || "");
      const match = source.match(/(미추홀구|서구|남동구|계양구|연수구|중구|동구|강화군|옹진군)/);
      return match ? match[1] : "";
    }

    function toLatLng(row, latKey = "위도", lngKey = "경도") {
      const lat = Number(row[latKey]);
      const lng = Number(row[lngKey]);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
      return new kakao.maps.LatLng(lat, lng);
    }

    function getSchoolId(row = {}) {
      return row["학교ID"] || row.school_id || row.schoolId || "";
    }

    function getSchoolName(row = {}) {
      return row["학교명"] || row.school_name || row.name || "학교";
    }

    function getSchoolJoinKeys(row = {}) {
      return [getSchoolId(row), getSchoolName(row)].filter(Boolean);
    }

    function createRowMap(rows, keySelector) {
      const map = new Map();
      rows.forEach((row) => {
        const key = keySelector(row);
        if (key) map.set(key, row);
      });
      return map;
    }

    function mergeSchoolPriorityWithCoords(priorityRows, coordRows) {
      const coordMap = new Map(
        coordRows.map((row) => [getSchoolId(row), row])
      );

      return priorityRows.map((row) => {
        const schoolId = getSchoolId(row);
        const coordRow = coordMap.get(schoolId) || {};
        return {
          ...coordRow,
          ...row,
          학교ID: schoolId || coordRow["학교ID"] || "",
          학교명: row["학교명"] || coordRow["학교명"] || "",
          위도: row["위도"] ?? coordRow["위도"],
          경도: row["경도"] ?? coordRow["경도"],
          gu: row.gu || coordRow.gu || detectGu(row) || detectGu(coordRow)
        };
      });
    }

    function enrichSchoolRows(rows, beneficiaryRows, studentTrendRows, nearestParkRows, similarRows) {
      const beneficiaryById = createRowMap(beneficiaryRows, (row) => row["학교ID"] || row.school_id || "");
      const nearestParkById = createRowMap(nearestParkRows, (row) => row["학교ID"] || row.school_id || "");
      const similarById = createRowMap(similarRows, (row) => row["학교ID"] || row.school_id || "");
      const trendById = new Map();

      studentTrendRows.forEach((row) => {
        const schoolId = getSchoolId(row);
        if (!schoolId) return;
        const current = trendById.get(schoolId) || [];
        current.push({
          year: Number(row["연도"] ?? row.year),
          students: Number(row["학생수"] ?? row.students)
        });
        trendById.set(schoolId, current);
      });

      return rows.map((row) => {
        const schoolId = getSchoolId(row);
        const schoolName = getSchoolName(row);
        const beneficiary = beneficiaryById.get(schoolId) || {};
        const nearestPark = nearestParkById.get(schoolId) || {};
        const similar = similarById.get(schoolId) || {};
        const studentTrend = (trendById.get(schoolId) || [])
          .filter((item) => Number.isFinite(item.year) && Number.isFinite(item.students))
          .sort((left, right) => left.year - right.year);
        return {
          ...row,
          ...beneficiary,
          ...nearestPark,
          ...similar,
          nearest_park_dist_m: Number.isFinite(Number(row.nearest_park_dist_m))
            ? row.nearest_park_dist_m
            : nearestPark.nearest_park_dist_m,
          studentTrend,
          학교ID: schoolId,
          학교명: schoolName
        };
      });
    }

    function getCaseTypeLabel(caseType) {
      const numeric = Number(caseType);
      return CASE_TYPE_LABELS[numeric] || "데이터 준비 중";
    }

    function getSchoolBadge(row = {}) {
      const caseType = Number(row.case_type);
      if (caseType === 3) return { text: "최우선 지원", className: "critical" };
      if (caseType === 2) return { text: "우선 지원", className: "high" };
      if (caseType === 1) return { text: "관심 필요", className: "watch" };
      return { text: "일반 관리", className: "normal" };
    }

    function getMirageBadge(row = {}) {
      return getOutlierType(row) === "착시" ? { text: "행정착시", className: "immediate" } : null;
    }

    function formatAccessRatio(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "데이터 준비 중";
      return `${(numeric * 100).toFixed(1)}%`;
    }

    function formatCount(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "-";
      return Math.round(numeric).toLocaleString("ko-KR");
    }

    function formatDecimal(value, digits = 2) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "-";
      return numeric.toFixed(digits);
    }

    function formatDistanceMeters(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "-";
      return Math.round(numeric).toLocaleString("ko-KR");
    }

    function hasTruthyFlag(value) {
      if (typeof value === "boolean") return value;
      const numeric = Number(value);
      if (Number.isFinite(numeric)) return numeric === 1;
      return String(value || "").trim().toLowerCase() === "true";
    }

    function formatSummaryPercent(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "-";
      return `${(numeric * 100).toFixed(1)}%`;
    }

    function getRedevelopmentBadgeMeta(stage) {
      const value = String(stage || "").trim();
      const grayStages = ["정비구역지정(후보지 1차/2차)", "주민합의체"];
      const blueStages = ["조합설립인가", "건축심의 접수", "건축심의완료"];
      const orangeStages = ["사업시행계획인가"];
      const redStages = ["관리처분계획인가", "착공", "준공"];

      if (redStages.includes(value)) return { className: "red", prefix: "⚠️ " };
      if (orangeStages.includes(value)) return { className: "orange", prefix: "" };
      if (blueStages.includes(value)) return { className: "blue", prefix: "" };
      if (grayStages.includes(value)) return { className: "gray", prefix: "" };
      return { className: "gray", prefix: "" };
    }

    function getNearbyRedevelopmentZones(row, radiusMeters = 500) {
      const schoolLat = Number(row["위도"]);
      const schoolLng = Number(row["경도"]);
      if (!Number.isFinite(schoolLat) || !Number.isFinite(schoolLng)) return [];

      return state.datasets.redevelopment
        .map((zone) => {
          const zoneLat = Number(zone["위도"]);
          const zoneLng = Number(zone["경도"]);
          if (!Number.isFinite(zoneLat) || !Number.isFinite(zoneLng)) return null;
          const distance = distanceInMeters(schoolLat, schoolLng, zoneLat, zoneLng);
          if (distance > radiusMeters) return null;
          return { ...zone, __distance: distance };
        })
        .filter(Boolean)
        .sort((left, right) => left.__distance - right.__distance);
    }

    function getRedevelopmentMarkup(row) {
      const nearbyZones = getNearbyRedevelopmentZones(row, 500);
      if (!nearbyZones.length) {
        return `<div class="metric-item muted">인근 재개발 구역 없음</div>`;
      }

      const items = nearbyZones
        .map((zone) => {
          const badge = getRedevelopmentBadgeMeta(zone["진행단계"]);
          const criticalClass = badge.className === "red" ? " critical" : "";
          return `
            <div class="redevelopment-item${criticalClass}">
              <div class="redevelopment-topline">
                <div class="redevelopment-name">${zone["구역명"] || "재개발 구역"}</div>
                <div class="redevelopment-distance">${formatDistanceMeters(zone.__distance)}m</div>
              </div>
              <div class="redevelopment-meta">
                <span class="redevelopment-stage-badge ${badge.className}">${badge.prefix}${zone["진행단계"] || "단계 정보 없음"}</span>
              </div>
            </div>
          `;
        })
        .join("");

      return `<div class="redevelopment-list">${items}</div>`;
    }

    function buildRedevelopmentProjectList(row, radiusMeters = 500) {
      return getNearbyRedevelopmentZones(row, radiusMeters).map((zone) => ({
        name: zone["구역명"] || zone["援ъ뿭紐?"] || "재개발 구역",
        stage: zone["진행단계"] || zone["吏꾪뻾?④퀎"] || "단계 정보 없음",
        distanceM: Math.round(Number(zone.__distance) || 0),
        type: zone["사업유형"] || "",
        area: Number(zone["면적"]) || null,
      }));
    }

    function getNearbyLargeAptComplexes(row, radiusMeters = 500, minHouseholds = 500) {
      const schoolLat = Number(row["위도"] ?? row["?꾨룄"]);
      const schoolLng = Number(row["경도"] ?? row["寃쎈룄"]);
      if (!Number.isFinite(schoolLat) || !Number.isFinite(schoolLng)) return [];

      return state.datasets.largeApt
        .map((complex) => {
          const complexLat = Number(complex["위도"]);
          const complexLng = Number(complex["경도"]);
          const householdCount = Number(complex["세대수"]);
          if (!Number.isFinite(complexLat) || !Number.isFinite(complexLng) || !Number.isFinite(householdCount)) return null;
          if (householdCount < minHouseholds) return null;
          const distance = distanceInMeters(schoolLat, schoolLng, complexLat, complexLng);
          if (distance > radiusMeters) return null;
          return { ...complex, __distance: distance };
        })
        .filter(Boolean)
        .sort((left, right) => left.__distance - right.__distance);
    }

    function buildLargeApartmentComplexList(row, radiusMeters = 500, minHouseholds = 500) {
      return getNearbyLargeAptComplexes(row, radiusMeters, minHouseholds).map((complex) => ({
        name: complex["단지명"] || complex["단지명_norm"] || "대단지 아파트",
        householdCount: Math.round(Number(complex["세대수"]) || 0),
        distanceM: Math.round(Number(complex.__distance) || 0),
        address: complex["도로명주소"] || "",
      }));
    }

    function getStudentTrendMarkup(row) {
      const trend = Array.isArray(row.studentTrend) ? row.studentTrend : [];
      if (!trend.length) {
        return `
          <div class="trend-card">
            <div style="font-size:12px; color:#6b7280;">보유 연도 데이터 없음</div>
          </div>
        `;
      }

      const maxStudents = Math.max(...trend.map((item) => item.students), 1);
      const labels = trend
        .map((item) => `${item.year} ${formatCount(item.students)}명`)
        .join(" · ");
      const bars = trend
        .map((item) => {
          const height = Math.max(18, Math.round((item.students / maxStudents) * 48));
          return `
            <div class="trend-bar-col">
              <div class="trend-bar" style="height:${height}px;"></div>
              <div class="trend-year">${item.year}</div>
            </div>
          `;
        })
        .join("");

      return `
        <div class="trend-card">
          <div class="trend-bars">${bars}</div>
          <div class="trend-labels">${labels}</div>
        </div>
      `;
    }

    function getPotentialDemandMarkup(row) {
      const demand2029 = Number(row.predicted_2029);
      const demand2031 = Number(row.predicted_2031);
      if (!Number.isFinite(demand2029) && !Number.isFinite(demand2031)) {
        return `<div class="metric-item muted">잠재 수요 추정 데이터 없음</div>`;
      }

      return `
        <div class="metric-list">
          <div class="metric-item">이 지역에 공원을 추가할 경우 영향을 받을 수 있는 잠재 수요 규모입니다.</div>
          <div class="metric-item muted">(정밀 예측이 아닌 비교용 지표입니다)</div>
          ${Number.isFinite(demand2029) ? `<div class="metric-item">📈 2029 잠재 수요: ${formatCount(demand2029)}명</div>` : ""}
          ${Number.isFinite(demand2031) ? `<div class="metric-item">📈 2031 잠재 수요: ${formatCount(demand2031)}명</div>` : ""}
        </div>
      `;
    }

    function getSimilarSchoolsMarkup(row) {
      const similarIds = [1, 2, 3, 4, 5]
        .map((rank) => ({
          name: row[`similar_school_${rank}_name`],
          gu: row[`similar_school_${rank}_gu`],
          distance: row[`similar_school_${rank}_distance`]
        }))
        .filter((item) => item.name);

      if (!similarIds.length) {
        return `<div class="metric-item muted">유사학교 추천 데이터 없음</div>`;
      }

      const items = similarIds
        .map(
          (item, index) =>
            `<li>${index + 1}. ${item.name}${item.gu ? ` (${item.gu})` : ""}${Number.isFinite(Number(item.distance)) ? ` · 거리 ${Number(item.distance).toFixed(2)}` : ""}</li>`
        )
        .join("");

      return `
        <div class="metric-list">
          <div class="metric-item">이 학교와 공간 특성이 유사한 학교입니다.</div>
          <div class="metric-item muted">공원 접근성, 주변 인구, 주거 환경 등을 기준으로 비교됩니다.</div>
          <div class="detail-section-title" style="margin-top:10px;">유사학교 5개</div>
          <ul style="margin:6px 0 0 18px; padding:0; line-height:1.7;">${items}</ul>
          <div class="detail-section-title" style="margin-top:12px;">공통점</div>
          <div class="metric-item">${row.common_points || row.common_traits || "유사학교 평균 대비 공통점 정보 없음"}</div>
          <div class="detail-section-title" style="margin-top:12px;">상대 강점</div>
          <div class="metric-item">${row.relative_strengths || "유사학교 대비 강점 정보 없음"}</div>
          <div class="detail-section-title" style="margin-top:12px;">상대 약점</div>
          <div class="metric-item">${row.relative_weaknesses || "유사학교 대비 약점 정보 없음"}</div>
        </div>
      `;
    }

    function buildLegacySchoolSnapshot(row = {}) {
      const trend = Array.isArray(row.studentTrend)
        ? row.studentTrend
            .filter((item) => Number.isFinite(Number(item.year)) && Number.isFinite(Number(item.students)))
            .sort((left, right) => Number(left.year) - Number(right.year))
            .map((item) => ({
              year: String(item.year),
              value: Number(item.students)
            }))
        : [];

      const similarSchools = [1, 2, 3, 4, 5]
        .map((rank) => {
          const schoolName = row[`similar_school_${rank}_name`];
          if (!schoolName) return null;
          return {
            schoolName: String(schoolName),
            districtName: String(row[`similar_school_${rank}_gu`] || ""),
            nearestParkDistanceM: Number(row[`similar_school_${rank}_nearest_park_dist_m`]),
            greenRatio: Number(row[`similar_school_${rank}_iso_green_ratio`]),
            playgroundCount: Number(row[`similar_school_${rank}_iso_playground_count`]),
            legacy_similarity_distance: Number(row[`similar_school_${rank}_distance`]),
          };
        })
        .filter(Boolean);

      const missing = [];
      if (!getSchoolId(row)) missing.push("school_id");
      if (!Number.isFinite(Number(row.nearest_park_dist_m))) missing.push("legacy_nearest_park_distance_m");
      if (!Number.isFinite(Number(row.iso_green_ratio))) missing.push("legacy_iso_green_ratio");
      if (!Number.isFinite(Number(row.iso_playground_count))) missing.push("legacy_iso_playground_count");

      return {
        school_id: getSchoolId(row) || null,
        school_name: getSchoolName(row),
        gu: detectGu(row) || "",
        legacy_case_label: getCaseTypeLabel(row.case_type),
        legacy_badge_text: (getSchoolBadge(row) || {}).text || "",
        legacy_status_message: getDiagnosticMessage(row),
        legacy_nearest_park_name: row.nearest_park_name || row.nearest_park_name_clean || null,
        legacy_nearest_park_distance_m: Number.isFinite(Number(row.nearest_park_dist_m)) ? Number(row.nearest_park_dist_m) : null,
        legacy_iso_park_count: Number.isFinite(Number(row.iso_park_count)) ? Number(row.iso_park_count) : null,
        legacy_buf_park_count: Number.isFinite(Number(row.buf_park_count)) ? Number(row.buf_park_count) : null,
        legacy_iso_playground_count: Number.isFinite(Number(row.iso_playground_count)) ? Number(row.iso_playground_count) : null,
        legacy_buf_playground_count: Number.isFinite(Number(row.buf_playground_count)) ? Number(row.buf_playground_count) : null,
        legacy_iso_green_ratio: Number.isFinite(Number(row.iso_green_ratio)) ? Number(row.iso_green_ratio) : null,
        legacy_access_ratio: Number.isFinite(Number(row.access_ratio)) ? Number(row.access_ratio) : null,
        legacy_gap_count: Number.isFinite(Number(row.gap_count)) ? Number(row.gap_count) : null,
        legacy_student_trend: trend,
        legacy_similar_schools: similarSchools,
        legacy_common_points: row.common_points || row.common_traits || null,
        legacy_relative_strengths: row.relative_strengths || null,
        legacy_relative_weaknesses: row.relative_weaknesses || null,
        legacy_missing_fields: missing,
      };
    }

      const hasPriorityData =
        row.priority_score !== undefined &&

      if (!hasPriorityData) {

            <div style="font-size:12px; color:#6b7280;">${gu}</div>
            <div style="margin-top:12px; font-size:12px; color:#4b5563;">데이터 준비 중</div>
          </div>

        <div style="padding:14px 16px; min-width:260px; line-height:1.65; font-family:Pretendard,'Noto Sans KR',sans-serif;">

          🌳 도보 접근 공원: ${isoParkCount}개 / 직선 반경 내 공원: ${formatCount(row.buf_park_count)}개<br>
          🛝 도보 접근 놀이터: ${formatCount(row.iso_playground_count)}개 / 직선 반경 내 놀이터: ${formatCount(row.buf_playground_count)}개<br>
          👶 초등학령 아동: ${formatCount(isoChild)}명<br>
          📊 접근성 비율: ${formatAccessRatio(row.access_ratio)} (도보/직선)<br>

          ${trendMarkup}
        </div>
      `;
    }

    function getClickSearchPopupHtml(rows) {
      if (!rows.length) {

    function distanceInMeters(lat1, lng1, lat2, lng2) {
      const toRadians = (degrees) => (degrees * Math.PI) / 180;
      const earthRadius = 6371000;
      const dLat = toRadians(lat2 - lat1);
      const dLng = toRadians(lng2 - lng1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRadians(lat1)) * Math.cos(toRadians(lat2)) * Math.sin(dLng / 2) ** 2;
      return 2 * earthRadius * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function findNearbySchools(latLng, radiusMeters = 500) {
      const clickLat = latLng.getLat();
      const clickLng = latLng.getLng();

      return state.datasets.schools
        .filter(shouldShowByGu)
        .map((row) => {
          const schoolLat = Number(row["위도"]);
          const schoolLng = Number(row["경도"]);
          if (!Number.isFinite(schoolLat) || !Number.isFinite(schoolLng)) return null;
          const distance = distanceInMeters(clickLat, clickLng, schoolLat, schoolLng);
          if (distance > radiusMeters) return null;
          return { ...row, __distance: distance };
        })
        .filter(Boolean)
        .sort((left, right) => left.__distance - right.__distance);
    }

    function applyPolygonStyle(polygon, style) {
      polygon.setOptions({
        strokeWeight: style.strokeWeight,
        strokeColor: style.strokeColor,

        strokeStyle: style.strokeStyle || "solid",
        fillColor: style.fillColor,

    function getCandidateLatLng(candidate) {
      if (!candidate || !candidate.candidate_meta) return null;
      if (candidate.candidate_meta.candidate_type === "external_grid") {
        const lat = Number(candidate.candidate_meta.center_y);
        const lng = Number(candidate.candidate_meta.center_x);
        if (Number.isFinite(lat) && Number.isFinite(lng)) {
          return new kakao.maps.LatLng(lat, lng);
        }
      }

      if (candidate.candidate_meta.candidate_type === "school_internal") {
        const schoolId = candidate.candidate_meta.school_id;
        const schoolRow = state.datasets.schools.find((row) => getSchoolId(row) === schoolId);
        if (!schoolRow) return null;
        return toLatLng(
          schoolRow,
          schoolRow["?꾨룄"] !== undefined ? "?꾨룄" : "lat",
          schoolRow["寃쎈룄"] !== undefined ? "寃쎈룄" : "lng"
        );
      }

      return null;
    }

    function geometryToOverlays(geojson, style) {
      const overlays = [];
      if (!geojson || !Array.isArray(geojson.features)) return overlays;

      geojson.features.forEach((feature) => {
        if (!shouldShowByGu(feature.properties || {})) return;

        const geometry = feature.geometry;
        if (!geometry) return;

        if (geometry.type === "Polygon") {
          const polygon = new kakao.maps.Polygon({
            path: geometry.coordinates[0].map(([lng, lat]) => new kakao.maps.LatLng(lat, lng)),
            strokeWeight: style.strokeWeight,
            strokeColor: style.strokeColor,
            strokeOpacity: style.strokeOpacity,
            strokeStyle: style.strokeStyle || "solid",
            fillColor: style.fillColor,
            fillOpacity: style.fillOpacity
          });
          polygon.__schoolKeys = [feature.properties?.["학교ID"], feature.properties?.["학교명"]].filter(Boolean);
          polygon.__defaultStyle = { ...style };
          polygon.__highlightStyle = {
            strokeWeight: 3,
            strokeColor: "#E53E3E",
            strokeOpacity: 1,
            strokeStyle: "solid",
            fillColor: "#FEB2B2",
            fillOpacity: 0.4
          };
          overlays.push(polygon);
        }

        if (geometry.type === "MultiPolygon") {
          geometry.coordinates.forEach((polygonCoords) => {
            const polygon = new kakao.maps.Polygon({
              path: polygonCoords[0].map(([lng, lat]) => new kakao.maps.LatLng(lat, lng)),
              strokeWeight: style.strokeWeight,
              strokeColor: style.strokeColor,
              strokeOpacity: style.strokeOpacity,
              strokeStyle: style.strokeStyle || "solid",
              fillColor: style.fillColor,
              fillOpacity: style.fillOpacity
            });
            polygon.__schoolKeys = [feature.properties?.["학교ID"], feature.properties?.["학교명"]].filter(Boolean);
            polygon.__defaultStyle = { ...style };
            polygon.__highlightStyle = {
              strokeWeight: 3,
              strokeColor: "#E53E3E",
              strokeOpacity: 1,
              strokeStyle: "solid",
              fillColor: "#FEB2B2",
              fillOpacity: 0.4
            };
            overlays.push(polygon);
          });
        }
      });

      return overlays;
    }

    function renderGeoJsonLayer(groupName, geojson, style, visible) {
      clearOverlayGroup(groupName);
      const overlays = geometryToOverlays(geojson, style);
      overlays.forEach((overlay) => applyPolygonStyle(overlay, overlay.__defaultStyle || style));
      overlays.forEach((overlay) => overlay.setMap(visible ? state.map : null));
      state.overlays[groupName] = overlays;

      ui.panelToggleButton.addEventListener("click", () => {
        ui.panel.classList.toggle("open");
        ui.panelToggleButton.textContent = ui.panel.classList.contains("open") ? "필터 닫기" : "필터 열기";
      });

      kakao.maps.event.addListener(state.map, "zoom_changed", () => {
        renderSchoolMarkers();
      });

      kakao.maps.event.addListener(state.map, "click", (mouseEvent) => {
        if (state.suppressNextMapClick) {
          state.suppressNextMapClick = false;
          return;
        }

        const nearbySchools = findNearbySchools(mouseEvent.latLng, 500);
        state.infoWindow.setContent(getClickSearchPopupHtml(nearbySchools));
        state.infoWindow.setPosition(mouseEvent.latLng);
        state.infoWindow.open(state.map);
      });
    }

    function normalizeCaseType(value) {
      const raw = String(value || "").trim().toLowerCase();
      if (CASE_META[raw]) return raw;
      const numeric = Number(value);
      if (numeric === 1) return "case1";
      if (numeric === 2) return "case2";
      if (numeric === 3) return "case3";
      if (numeric === 4) return "case4";
      return "case4";
    }

    function getCaseMeta(rowOrType = {}) {
      const caseType = typeof rowOrType === "string"
        ? normalizeCaseType(rowOrType)
        : normalizeCaseType(rowOrType.case_type);
      return CASE_META[caseType] || CASE_META.case4;
    }

    function getMarkerStyle(row = {}) {
      const outlierType = getOutlierType(row);
      const borderColor = outlierType === "李⑹떆" ? "#6B46C1" : "";
      return { color: getCaseMeta(row).color, symbol: "", borderColor };
    }

    function getCaseTypeLabel(row = {}) {
      const csvLabel = String(row.case_label || "").trim();
      if (csvLabel && csvLabel !== "????") return csvLabel;
      return getCaseMeta(row).label;
    }

    function getSchoolBadge(row = {}) {
      const caseMeta = getCaseMeta(row);
      return { text: caseMeta.badge, className: caseMeta.className };
    }

    function getDiagnosticMessage(row = {}) {
      const caseType = normalizeCaseType(row.case_type);
      if (caseType === "case1") return "가까운 공원까지의 도보 거리가 길고 아동 수요도 높은 편입니다. 즉시 개선이 필요합니다.";
      if (caseType === "case2") return "공원 접근 거리가 다소 길거나 아동 수요 대비 보완이 필요합니다. 우선 검토 대상입니다.";
      if (caseType === "case3") return "가까운 공원은 있지만 놀이터 수가 적어 수요 관리가 필요합니다.";
      if (caseType === "island") return "도서 지역 특성을 고려한 별도 정책 검토가 필요합니다.";
      return "현재 기준에서 공원 접근성과 놀이터 여건이 비교적 안정적입니다.";
    }

    function getCaseThemeClass(row = {}) {
      return `case-${normalizeCaseType(row.case_type)}`;
    }

    function getMetricClass(row, metricType) {
      const caseType = normalizeCaseType(row.case_type);
      if (caseType === "case4") return "metric-item muted";
      if (caseType === "island") return "metric-item";
      if (caseType === "case1" && (metricType === "park" || metricType === "access")) return "metric-item danger";
      if (caseType === "case2" && metricType === "park") return "metric-item warning";
      if (caseType === "case3" && metricType === "parkPressure") return "metric-item warning";
      return "metric-item";
    }

    function refreshLegend() {
      const legend = document.querySelector(".legend");
      if (!legend) return;
      legend.innerHTML = `
        <div class="legend-item">
          <span class="swatch" style="background:#ffffff; border:3px solid #6B46C1; box-sizing:border-box;"></span>
          <span>행정착시(보라 테두리)</span>
        </div>
        <div class="legend-item">
          <span class="swatch" style="background:#E53935;"></span>
          <span>즉시개선필요</span>
        </div>
        <div class="legend-item">
          <span class="swatch" style="background:#FB8C00;"></span>
          <span>우선검토대상</span>
        </div>
        <div class="legend-item">
          <span class="swatch" style="background:#FDD835;"></span>
          <span>수요관리필요</span>
        </div>
        <div class="legend-item">
          <span class="swatch" style="background:#43A047;"></span>
          <span>현상유지</span>
        </div>
        <div class="legend-item">
          <span class="swatch" style="background:#1E88E5;"></span>
          <span>🏝️ 별도정책필요</span>
        </div>
      `;
    }

    function getGreenLeafMeta(row = {}) {
      const leaf = Number(row.green_leaf);
      if (leaf === 3) return { text: "🍃 상위 25%", className: "success" };
      if (leaf === 2) return { text: "🍂 25~75%", className: "neutral" };
      if (leaf === 1) return { text: "🥀 하위 25%", className: "warning" };
      return null;
    }

    function getMarkerStyle(row = {}) {
      const outlierType = getOutlierType(row);
      const hasExtremeFlag = Number(row.extreme_flag || 0) === 1;
      const borderColor = hasExtremeFlag
        ? "#FFD700"
        : outlierType === "착시"
          ? "#6B46C1"
          : "";
      return { color: getCaseMeta(row).color, symbol: "", borderColor };
    }

    function isCandidatePanelResponse(payload) {
      return Boolean(
        payload &&
        typeof payload === "object" &&
        payload.candidate_meta &&
        typeof payload.candidate_meta === "object" &&
        typeof payload.candidate_meta.candidate_type === "string"
      );
    }

    function getCandidateBadgeToneClass(tone) {
      if (tone === "positive") return "success";
      if (tone === "warning") return "warning";
      if (tone === "danger") return "critical";
      return "neutral";
    }

    function getCandidateTypeLabel(type) {
      return type === "school_internal" ? "학교 내부 대안" : "외부 후보지";
    }

    function getCandidateLandFeasibilityLabel(level) {
      if (level === "high") return "실행 가능성 높음";
      if (level === "medium") return "현장 검토 필요";
      if (level === "low") return "외부 설치 어려움";
      return "실행 가능성 정보 없음";
    }

    function formatCandidateValue(value, suffix = "") {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return suffix ? `정보 없음` : "정보 없음";
      const rounded = Math.abs(numeric % 1) > 0 ? numeric.toFixed(1) : Math.round(numeric).toLocaleString("ko-KR");
      return `${rounded}${suffix}`;
    }

    function formatCandidatePotentialDemand(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "추정값 없음";
      return Math.abs(numeric % 1) > 0 ? numeric.toFixed(1) : Math.round(numeric).toLocaleString("ko-KR");
    }

    function getCandidateSecondaryOptionDisplayValue(secondaryOption) {
      return secondaryOption || "보조 대안 없음";
    }

    function getCandidateExplanationTagsDisplay(tags) {
      return Array.isArray(tags) && tags.length ? tags : [];
    }

    function mapCandidatePanelResponseToViewModel(panel) {
      const candidateType = panel?.candidate_meta?.candidate_type;
      const linkedSchools = panel?.linked_schools || {};
      const linkedSchoolNames = Array.isArray(linkedSchools.linked_school_names) ? linkedSchools.linked_school_names : [];
      const linkedSchoolIds = Array.isArray(linkedSchools.linked_school_ids) ? linkedSchools.linked_school_ids : [];
      const linkedSchoolRows = Array.isArray(linkedSchools.schools) ? linkedSchools.schools : [];
      const explanationTags = getCandidateExplanationTagsDisplay(panel?.explanation?.explanation_tags);
      const secondaryOption = panel?.strategy_recommendation?.secondary_option || null;

      if (candidateType === "school_internal") {
        const badges = [
          { key: "candidate_type", label: getCandidateTypeLabel(candidateType), tone: "info" }
        ];

          badges.push({ key: "requires_field_review", label: "현장 검토 필요", tone: "warning" });
        }

        return {
          panel_kind: "school_internal",
          title: `${panel.candidate_meta.school_name} 내부 후보지`,
          subtitle: "설치 검토 가능한 정책 대안",
          badges,
          demand_cards: panel?.ui_flags?.show_demand_cards === false ? [] : [
            {
              key: "predicted_2029",
              label: "2029 XGBoost 예측 잠재수혜인원",
              value: formatCandidatePotentialDemand(panel?.demand_summary?.predicted_2029),
              note: panel?.demand_summary?.demand_note || "250m 격자 단위 XGBoost 예측 잠재수혜인원입니다."
            },
            {
              key: "predicted_2031",
              label: "2031 XGBoost 예측 잠재수혜인원",
              value: formatCandidatePotentialDemand(panel?.demand_summary?.predicted_2031),
              note: panel?.demand_summary?.demand_note || "250m 격자 단위 XGBoost 예측 잠재수혜인원입니다."
            }
          ],
          accessibility_items: [
            { key: "install_option", label: "설치 검토 옵션", value: panel?.accessibility_summary?.install_option || "정보 없음" },
            { key: "space_constraint_level", label: "공간 제약 수준", value: panel?.accessibility_summary?.space_constraint_level || "정보 없음" },
            { key: "expected_benefit_scope", label: "기대 효과 범위", value: panel?.accessibility_summary?.expected_benefit_scope || "정보 없음" },
            { key: "land_feasibility_note", label: "현장 검토 메모", value: panel?.accessibility_summary?.land_feasibility_note || "정보 없음" }
          ],
