<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>인천 초등학교 아동 야외활동 환경 격차 지도</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg: #f3efe4;
      --panel: rgba(255, 251, 243, 0.96);
      --panel-border: rgba(110, 89, 51, 0.18);
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #14532d;
      --accent-soft: #d9ead3;
      --danger: #e53e3e;
      --warning: #ed8936;
      --success: #38a169;
      --shadow: 0 18px 48px rgba(61, 42, 20, 0.16);
      --radius: 22px;
      --touch: 44px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 232, 186, 0.9), transparent 28%),
        radial-gradient(circle at top right, rgba(193, 232, 201, 0.8), transparent 26%),
        linear-gradient(180deg, #f9f4ea 0%, #f0ece3 100%);
    }

    body {
      overflow: hidden;
    }

    .app-shell {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .panel {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 20;
      width: min(360px, calc(100vw - 36px));
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 20px 10px;
      border-bottom: 1px solid rgba(110, 89, 51, 0.09);
      background: linear-gradient(135deg, rgba(243, 223, 180, 0.4), rgba(210, 233, 216, 0.45));
    }

    .eyebrow {
      margin: 0 0 6px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7c5c27;
      font-weight: 700;
    }

    .panel-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .panel-subtitle {
      margin: 8px 0 0;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .panel-body {
      padding: 16px 18px 18px;
      max-height: calc(100vh - 60px);
      overflow: auto;
    }

    .section {
      margin-bottom: 18px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 800;
      color: #775f34;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    select, .toggle-row {
      min-height: var(--touch);
    }

    select {
      width: 100%;
      border: 1px solid rgba(99, 78, 40, 0.18);
      border-radius: 14px;
      background: #fffdfa;
      padding: 10px 14px;
      font-size: 15px;
      color: var(--text);
      outline: none;
    }

    .toggle-list {
      display: grid;
      gap: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(99, 78, 40, 0.12);
    }

    .toggle-row input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .toggle-row label {
      flex: 1;
      font-size: 15px;
      cursor: pointer;
    }

    .legend {
      display: grid;
      gap: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: var(--touch);
      padding: 8px 0;
      font-size: 14px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex: 0 0 auto;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.75);
    }

    .status-box {
      min-height: 92px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #fffdfa;
      border: 1px dashed rgba(99, 78, 40, 0.2);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .summary-box {
      min-height: 120px;
      max-height: 320px;
      padding: 14px;
      position: relative;
      z-index: 2;
      border-radius: 16px;
      background: #fffdfa;
      border: 1px solid rgba(99, 78, 40, 0.16);
      font-size: 13px;
      line-height: 1.7;
      white-space: normal;
      word-break: break-word;
      overflow-y: auto;
    }

    .summary-grid {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .summary-list {
      display: grid;
      gap: 6px;
    }

    .school-detail-box {
      min-height: 280px;
      padding: 16px;
      border-radius: 18px;
      background: #fffdfa;
      border: 1px solid rgba(99, 78, 40, 0.16);
      font-size: 13px;
      line-height: 1.7;
      white-space: normal;
      word-break: break-word;
    }

    .school-detail-box.case-3 {
      background: #fff1f1;
      border-color: rgba(229, 62, 62, 0.24);
    }

    .school-detail-box.case-4 {
      color: var(--muted);
    }

    .detail-head {
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(99, 78, 40, 0.12);
    }

    .detail-name {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .detail-subtitle {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    .detail-badge {
      display: inline-flex;
      align-items: center;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .detail-badge.immediate {
      color: #ffffff;
      background: #6b46c1;
    }

    .detail-badge.critical {
      color: #ffffff;
      background: #c53030;
    }

    .detail-badge.high {
      color: #7b341e;
      background: #f6ad55;
    }

    .detail-badge.watch {
      color: #744210;
      background: #f6e05e;
    }

    .detail-badge.normal {
      color: #ffffff;
      background: #2f855a;
    }

    .detail-badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .detail-message-extra {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #6b46c1;
    }

    .detail-badge.warning {
      color: #7b341e;
      background: #fbd38d;
    }

    .detail-badge.neutral {
      color: #4b5563;
      background: #e5e7eb;
    }

    .detail-badge.success {
      color: #ffffff;
      background: #2f855a;
    }

    .detail-message {
      margin: 0 0 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(217, 234, 211, 0.32);
      border: 1px solid rgba(20, 83, 45, 0.12);
    }

    .detail-message.case-2 {
      background: rgba(254, 226, 226, 0.65);
      border-color: rgba(229, 62, 62, 0.18);
    }

    .detail-message.case-3 {
      background: rgba(254, 226, 226, 0.9);
      border-color: rgba(229, 62, 62, 0.28);
    }

    .detail-section {
      margin-top: 14px;
    }

    .detail-section-title {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #7c5c27;
    }

    .metric-list {
      display: grid;
      gap: 8px;
    }

    .metric-item {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(99, 78, 40, 0.1);
    }

    .metric-item.muted {
      color: var(--muted);
      background: rgba(243, 244, 246, 0.72);
    }

    .metric-item.warning {
      color: #9c4221;
      background: rgba(254, 235, 200, 0.9);
      border-color: rgba(237, 137, 54, 0.2);
      font-weight: 700;
    }

    .metric-item.danger {
      color: #9b2c2c;
      background: rgba(254, 226, 226, 0.92);
      border-color: rgba(229, 62, 62, 0.24);
      font-weight: 800;
    }

    .metric-item.success {
      color: #22543d;
      background: rgba(198, 246, 213, 0.9);
      border-color: rgba(47, 133, 90, 0.22);
      font-weight: 700;
    }

    .trend-card {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(99, 78, 40, 0.1);
    }

    .trend-bars {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      min-height: 72px;
      margin: 8px 0 6px;
    }

    .trend-bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .trend-bar {
      width: 18px;
      min-height: 18px;
      border-radius: 6px 6px 3px 3px;
      background: linear-gradient(180deg, #2f855a 0%, #68d391 100%);
    }

    .trend-year {
      font-size: 10px;
      color: #4b5563;
    }

    .trend-labels {
      font-size: 11px;
      color: #4b5563;
    }

    .redevelopment-list {
      display: grid;
      gap: 8px;
    }

    .redevelopment-item {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(99, 78, 40, 0.1);
    }

    .redevelopment-item.critical {
      border: 2px solid #e03c31;
      background: rgba(254, 226, 226, 0.88);
    }

    .redevelopment-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .redevelopment-name {
      font-weight: 800;
      color: #1f2937;
      word-break: break-word;
    }

    .redevelopment-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
    }

    .redevelopment-stage-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
      border: 1px solid transparent;
    }

    .redevelopment-stage-badge.gray {
      background: rgba(158, 158, 158, 0.16);
      color: #616161;
    }

    .redevelopment-stage-badge.blue {
      background: rgba(92, 155, 214, 0.16);
      color: #336b9b;
    }

    .redevelopment-stage-badge.orange {
      background: rgba(240, 165, 0, 0.16);
      color: #9a6700;
    }

    .redevelopment-stage-badge.red {
      background: rgba(224, 60, 49, 0.12);
      color: #b1261e;
      border-color: rgba(224, 60, 49, 0.5);
      font-weight: 900;
    }

    .redevelopment-distance {
      color: #4b5563;
      font-weight: 700;
      white-space: nowrap;
    }

    .detail-score {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255, 247, 237, 0.9);
      border: 1px solid rgba(237, 137, 54, 0.2);
      font-weight: 800;
    }

    .panel-util {
      display: none;
    }

    .school-link {
      width: 100%;
      position: relative;
      z-index: 3;
      text-align: left;
      border: 1px solid rgba(99, 78, 40, 0.16);
      border-radius: 12px;
      background: rgba(217, 234, 211, 0.35);
      padding: 8px 10px;
      font: inherit;
      color: var(--text);
      cursor: pointer;
    }

    .school-link:hover {
      background: rgba(217, 234, 211, 0.6);
    }

    .mobile-handle {
      display: none;
      width: 48px;
      height: 5px;
      border-radius: 999px;
      background: rgba(73, 54, 21, 0.2);
      margin: 0 auto 12px;
    }

    .floating-button {
      display: none;
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 30;
      min-width: var(--touch);
      min-height: var(--touch);
      padding: 0 16px;
      border: 0;
      border-radius: 999px;
      background: #1f5136;
      color: white;
      font-size: 14px;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .layer-toggle-bar {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 25;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 251, 243, 0.92);
      border: 1px solid rgba(110, 89, 51, 0.14);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      max-width: calc(100vw - 36px);
    }

    .layer-toggle-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(99, 78, 40, 0.14);
      background: #ffffff;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease, color 0.18s ease;
    }

    .layer-toggle-btn:hover {
      transform: translateY(-1px);
    }

    .layer-toggle-btn.is-on[data-layer="isochrone"] {
      background: rgba(16, 185, 129, 0.16);
      border-color: rgba(16, 185, 129, 0.38);
      color: #065f46;
    }

    .layer-toggle-btn.is-on[data-layer="buffer"] {
      background: rgba(59, 130, 246, 0.14);
      border-color: rgba(59, 130, 246, 0.34);
      color: #1d4ed8;
    }

    .layer-toggle-btn.is-on[data-layer="parks"] {
      background: rgba(34, 197, 94, 0.14);
      border-color: rgba(34, 197, 94, 0.34);
      color: #166534;
    }

    .layer-toggle-btn.is-on[data-layer="redevelopment"] {
      background: rgba(245, 158, 11, 0.16);
      border-color: rgba(245, 158, 11, 0.34);
      color: #92400e;
    }

    .layer-toggle-btn.is-on[data-layer="childcare"] {
      background: rgba(168, 85, 247, 0.14);
      border-color: rgba(168, 85, 247, 0.34);
      color: #7c3aed;
    }

    @media (max-width: 768px) {
      .panel {
        top: auto;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        max-width: none;
        border-radius: 24px 24px 0 0;
        transform: translateY(calc(100% - 118px));
        transition: transform 0.28s ease;
      }

      .panel.open {
        transform: translateY(0);
      }

      .mobile-handle {
        display: block;
      }

      .panel-body {
        max-height: 52vh;
        padding-top: 2px;
      }

      .floating-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .layer-toggle-bar {
        left: 12px;
        right: 12px;
        bottom: 74px;
        gap: 8px;
        padding: 10px;
      }

      .layer-toggle-btn {
        flex: 1 1 calc(50% - 8px);
        font-size: 13px;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="map"></div>

    <button class="floating-button" id="panelToggleButton" type="button">필터 열기</button>

    <div class="layer-toggle-bar" id="layerToggleBar" aria-label="지도 레이어 토글">
      <button class="layer-toggle-btn" type="button" data-layer="isochrone">🚶 실제 도보이동 500m</button>
      <button class="layer-toggle-btn" type="button" data-layer="buffer">⭕ 직선거리 500m</button>
      <button class="layer-toggle-btn" type="button" data-layer="parks">🌳 공원·놀이터</button>
      <button class="layer-toggle-btn" type="button" data-layer="redevelopment">🏗️ 재개발</button>
      <button class="layer-toggle-btn" type="button" data-layer="childcare">🏫 어린이집·유치원</button>
    </div>

    <aside class="panel" id="controlPanel">
      <div class="panel-header">
        <div class="mobile-handle"></div>
        <p class="eyebrow">Incheon Outdoor Equity</p>
        <h1 class="panel-title">초등학교 야외활동 환경 격차 지도</h1>
        <p class="panel-subtitle">구 전체 현황과 학교별 진단을 한 화면에서 확인합니다.</p>
      </div>

      <div class="panel-body">
        <section class="section">
          <h2 class="section-title">구 선택</h2>
          <label class="field-label" for="guFilter">구 선택</label>
          <select id="guFilter">
            <option value="전체">전체</option>
            <option value="미추홀구">미추홀구</option>
            <option value="서구">서구</option>
            <option value="남동구">남동구</option>
            <option value="계양구">계양구</option>
            <option value="연수구">연수구</option>
            <option value="중구">중구</option>
            <option value="동구">동구</option>
            <option value="강화군">강화군</option>
            <option value="옹진군">옹진군</option>
          </select>
        </section>

        <section class="section">
          <h2 class="section-title">구 전체 통계</h2>
          <div class="summary-box" id="guSummaryBox">구를 선택하면 요약을 표시합니다.</div>
        </section>

        <section class="section">
          <h2 class="section-title">학교 상세</h2>
          <div class="school-detail-box" id="schoolDetailBox">학교 마커를 클릭하면 상세 정보를 표시합니다.</div>
        </section>

        <div class="panel-util" aria-hidden="true">
          <section class="section">
            <div class="toggle-list">
              <div class="toggle-row">
                <input type="checkbox" id="toggleIsochrone" />
                <label for="toggleIsochrone">도보 등시선</label>
              </div>
              <div class="toggle-row">
                <input type="checkbox" id="toggleBuffer" />
                <label for="toggleBuffer">직선 버퍼</label>
              </div>
              <div class="toggle-row">
                <input type="checkbox" id="toggleParks" checked />
                <label for="toggleParks">공원·놀이터</label>
              </div>
              <div class="toggle-row">
                <input type="checkbox" id="toggleRedevelopment" />
                <label for="toggleRedevelopment">재개발 구역</label>
              </div>
              <div class="toggle-row">
                <input type="checkbox" id="toggleChildcare" />
                <label for="toggleChildcare">어린이집·유치원</label>
              </div>
            </div>
          </section>
          <section class="section">
            <div class="legend">
              <div class="legend-item">
                <span class="swatch" style="background:#ffffff; border:3px solid #6B46C1; box-sizing:border-box;"></span>
                <span>행정착시(보라 테두리)</span>
              </div>
              <div class="legend-item">
                <span class="swatch" style="background:#E53E3E;"></span>
                <span>최우선 지원(case 3)</span>
              </div>
              <div class="legend-item">
                <span class="swatch" style="background:#ED8936;"></span>
                <span>우선 지원(case 2)</span>
              </div>
              <div class="legend-item">
                <span class="swatch" style="background:#F6E05E;"></span>
                <span>관심 필요(case 1)</span>
              </div>
              <div class="legend-item">
                <span class="swatch" style="background:#38A169;"></span>
                <span>일반 관리(case 4)</span>
              </div>
            </div>
          </section>
          <section class="section">
            <div class="status-box" id="statusBox">카카오맵 SDK를 불러오는 중입니다.</div>
          </section>
        </div>
      </div>
    </aside>
  </div>

  <!-- 
    카카오맵 키 설정 방법:
    1. .env 파일에서 KAKAO_MAP_KEY 복사
    2. 아래 YOUR_KEY_HERE 교체
    또는
    로컬 서버 실행 시 ?key=발급키 쿼리스트링으로 주입 가능
  -->
  <script>
    const urlKey = new URLSearchParams(window.location.search).get("key");
    window.KAKAO_MAP_KEY = urlKey || "YOUR_KEY_HERE";

    const PATHS = {
      schools: "./data_processed/school_priority.csv",
      schoolCoords: "./data_processed/schools.csv",
      studentTrend: "./data_processed/student_trend.csv",
      nearestPark: "./data_processed/school_nearest_park.csv",
      beneficiaryForecast: "./data_processed/beneficiary_forecast.csv",
      guSummary: "./data_processed/gu_summary.csv",

    const CASE_TYPE_LABELS = {

    function setStatus(message) {
      ui.statusBox.textContent = message;
    }

    function appendStatus(message) {
      ui.statusBox.textContent += `\n${message}`;
    }

    function syncLayerToggleButtons() {
      ui.layerButtons.forEach((button) => {
        const layer = button.dataset.layer;
        const input = ui.toggles[layer];
        const isOn = Boolean(input?.checked);
        button.classList.toggle("is-on", isOn);
        button.setAttribute("aria-pressed", String(isOn));
      });
    }

    function setupLayerToggleBar() {
      ui.layerButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const layer = button.dataset.layer;
          const input = ui.toggles[layer];
          if (!input) return;
          input.checked = !input.checked;
          updateOverlayVisibility();
          syncLayerToggleButtons();
        });
      });
      syncLayerToggleButtons();
    }

    function loadCSV(path) {
      return new Promise((resolve) => {
        Papa.parse(path, {
          download: true,
          header: true,
          skipEmptyLines: true,
          complete: (results) => {
            if (results.errors && results.errors.length) {
              console.error(`[loadCSV] ${path}`, results.errors);
            }
            resolve(results.data || []);
          },
          error: (error) => {
            console.error(`[loadCSV] ${path}`, error);
            resolve([]);
          }
        });
      });
    }

    async function loadGeoJSON(path) {
      try {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return await response.json();
      } catch (error) {
        console.error(`[loadGeoJSON] ${path}`, error);
        return null;
      }
    }

    function loadKakaoMapSdk() {
      return new Promise((resolve, reject) => {
        if (window.kakao && window.kakao.maps) {
          resolve();
          return;
        }

        const script = document.createElement("script");
        script.src = `https://dapi.kakao.com/v2/maps/sdk.js?autoload=false&appkey=${window.KAKAO_MAP_KEY}&libraries=clusterer`;
        script.onload = () => {
          if (!window.kakao || !window.kakao.maps) {
            reject(new Error("카카오맵 객체가 초기화되지 않았습니다."));
            return;
          }
          window.kakao.maps.load(resolve);
        };
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    function createMarkerImage(color, symbol = "", borderColor = "") {
      const inner = symbol
        ? `<text x="15" y="19" text-anchor="middle" font-size="12" font-weight="800" fill="#ffffff">${symbol}</text>`
        : `<circle cx="15" cy="15" r="4" fill="#ffffff" fill-opacity="0.95" />`;
      const stroke = borderColor
        ? `<circle cx="15" cy="15" r="12.5" fill="none" stroke="${borderColor}" stroke-width="3" />`
        : "";
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30">
          ${stroke}
          <circle cx="15" cy="15" r="11" fill="${color}" fill-opacity="0.95" />
          ${inner}
        </svg>
      `.trim();

      return new kakao.maps.MarkerImage(
        `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`,
        new kakao.maps.Size(30, 30),
        { offset: new kakao.maps.Point(15, 15) }
      );
    }

    function getOutlierType(row = {}) {
      const value = String(row.outlier_type || "").trim().toLowerCase();
      return value === "착시" ? value : "";
    }

    function getMarkerStyle(row = {}) {
      const outlierType = getOutlierType(row);
      const caseType = Number(row.case_type);
      const borderColor = outlierType === "착시" ? "#6B46C1" : "";
      if (caseType === 3) return { color: "#E53E3E", symbol: "", borderColor };
      if (caseType === 2) return { color: "#ED8936", symbol: "", borderColor };
      if (caseType === 1) return { color: "#F6E05E", symbol: "", borderColor };
      return { color: "#38A169", symbol: "", borderColor };
    }

    function detectGu(row) {
      return (
        row.gu ||
        row["구"] ||
        row["구명"] ||
        row["행정구역"] ||
        extractGuFromAddress(row["소재지도로명주소"] || row["주소"] || row["위치"] || "")
      );
    }

    function extractGuFromAddress(text) {
      const source = String(text || "");
      const match = source.match(/(미추홀구|서구|남동구|계양구|연수구|중구|동구|강화군|옹진군)/);
      return match ? match[1] : "";
    }

    function toLatLng(row, latKey = "위도", lngKey = "경도") {
      const lat = Number(row[latKey]);
      const lng = Number(row[lngKey]);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
      return new kakao.maps.LatLng(lat, lng);
    }

    function getSchoolId(row = {}) {
      return row["학교ID"] || row.school_id || row.schoolId || "";
    }

    function getSchoolName(row = {}) {
      return row["학교명"] || row.school_name || row.name || "학교";
    }

    function getSchoolJoinKeys(row = {}) {
      return [getSchoolId(row), getSchoolName(row)].filter(Boolean);
    }

    function createRowMap(rows, keySelector) {
      const map = new Map();
      rows.forEach((row) => {
        const key = keySelector(row);
        if (key) map.set(key, row);
      });
      return map;
    }

    function mergeSchoolPriorityWithCoords(priorityRows, coordRows) {
      const coordMap = new Map(
        coordRows.map((row) => [getSchoolId(row), row])
      );

      return priorityRows.map((row) => {
        const schoolId = getSchoolId(row);
        const coordRow = coordMap.get(schoolId) || {};
        return {
          ...coordRow,
          ...row,
          학교ID: schoolId || coordRow["학교ID"] || "",
          학교명: row["학교명"] || coordRow["학교명"] || "",
          위도: row["위도"] ?? coordRow["위도"],
          경도: row["경도"] ?? coordRow["경도"],
          gu: row.gu || coordRow.gu || detectGu(row) || detectGu(coordRow)
        };
      });
    }

    function enrichSchoolRows(rows, beneficiaryRows, studentTrendRows, nearestParkRows) {
      const beneficiaryById = createRowMap(beneficiaryRows, (row) => row["학교ID"] || row.school_id || "");
      const nearestParkById = createRowMap(nearestParkRows, (row) => row["학교ID"] || row.school_id || "");
      const trendById = new Map();

      studentTrendRows.forEach((row) => {
        const schoolId = getSchoolId(row);
        if (!schoolId) return;
        const current = trendById.get(schoolId) || [];
        current.push({
          year: Number(row["연도"] ?? row.year),
          students: Number(row["학생수"] ?? row.students)
        });
        trendById.set(schoolId, current);
      });

      return rows.map((row) => {
        const schoolId = getSchoolId(row);
        const schoolName = getSchoolName(row);
        const beneficiary = beneficiaryById.get(schoolId) || {};
        const nearestPark = nearestParkById.get(schoolId) || {};
        const studentTrend = (trendById.get(schoolId) || [])
          .filter((item) => Number.isFinite(item.year) && Number.isFinite(item.students))
          .sort((left, right) => left.year - right.year);
        return {
          ...row,
          ...beneficiary,
          ...nearestPark,
          studentTrend,
          학교ID: schoolId,
          학교명: schoolName
        };
      });
    }

    function getCaseTypeLabel(caseType) {
      const numeric = Number(caseType);
      return CASE_TYPE_LABELS[numeric] || "데이터 준비 중";
    }

    function getSchoolBadge(row = {}) {
      const caseType = Number(row.case_type);
      if (caseType === 3) return { text: "최우선 지원", className: "critical" };
      if (caseType === 2) return { text: "우선 지원", className: "high" };
      if (caseType === 1) return { text: "관심 필요", className: "watch" };
      return { text: "일반 관리", className: "normal" };
    }

    function getMirageBadge(row = {}) {
      return getOutlierType(row) === "착시" ? { text: "행정착시", className: "immediate" } : null;
    }

    function formatAccessRatio(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "데이터 준비 중";
      return `${(numeric * 100).toFixed(1)}%`;
    }

    function formatCount(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "-";
      return Math.round(numeric).toLocaleString("ko-KR");
    }

    function formatDecimal(value, digits = 2) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "-";
      return numeric.toFixed(digits);
    }

    function formatDistanceMeters(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "-";
      return Math.round(numeric).toLocaleString("ko-KR");
    }

    function formatSummaryPercent(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return "-";
      return `${(numeric * 100).toFixed(1)}%`;
    }

    function getRedevelopmentBadgeMeta(stage) {
      const value = String(stage || "").trim();
      const grayStages = ["정비구역지정(후보지 1차/2차)", "주민합의체"];
      const blueStages = ["조합설립인가", "건축심의 접수", "건축심의완료"];
      const orangeStages = ["사업시행계획인가"];
      const redStages = ["관리처분계획인가", "착공", "준공"];

      if (redStages.includes(value)) return { className: "red", prefix: "⚠️ " };
      if (orangeStages.includes(value)) return { className: "orange", prefix: "" };
      if (blueStages.includes(value)) return { className: "blue", prefix: "" };
      if (grayStages.includes(value)) return { className: "gray", prefix: "" };
      return { className: "gray", prefix: "" };
    }

    function getNearbyRedevelopmentZones(row, radiusMeters = 500) {
      const schoolLat = Number(row["위도"]);
      const schoolLng = Number(row["경도"]);
      if (!Number.isFinite(schoolLat) || !Number.isFinite(schoolLng)) return [];

      return state.datasets.redevelopment
        .map((zone) => {
          const zoneLat = Number(zone["위도"]);
          const zoneLng = Number(zone["경도"]);
          if (!Number.isFinite(zoneLat) || !Number.isFinite(zoneLng)) return null;
          const distance = distanceInMeters(schoolLat, schoolLng, zoneLat, zoneLng);
          if (distance > radiusMeters) return null;
          return { ...zone, __distance: distance };
        })
        .filter(Boolean)
        .sort((left, right) => left.__distance - right.__distance);
    }

    function getRedevelopmentMarkup(row) {
      const nearbyZones = getNearbyRedevelopmentZones(row, 500);
      if (!nearbyZones.length) {
        return `<div class="metric-item muted">인근 재개발 구역 없음</div>`;
      }

      const items = nearbyZones
        .map((zone) => {
          const badge = getRedevelopmentBadgeMeta(zone["진행단계"]);
          const criticalClass = badge.className === "red" ? " critical" : "";
          return `
            <div class="redevelopment-item${criticalClass}">
              <div class="redevelopment-topline">
                <div class="redevelopment-name">${zone["구역명"] || "재개발 구역"}</div>
                <div class="redevelopment-distance">${formatDistanceMeters(zone.__distance)}m</div>
              </div>
              <div class="redevelopment-meta">
                <span class="redevelopment-stage-badge ${badge.className}">${badge.prefix}${zone["진행단계"] || "단계 정보 없음"}</span>
              </div>
            </div>
          `;
        })
        .join("");

      return `<div class="redevelopment-list">${items}</div>`;
    }

    function getStudentTrendMarkup(row) {
      const trend = Array.isArray(row.studentTrend) ? row.studentTrend : [];
      if (!trend.length) {
        return `
          <div class="trend-card">
            <div style="font-size:12px; color:#6b7280;">보유 연도 데이터 없음</div>
          </div>
        `;
      }

      const maxStudents = Math.max(...trend.map((item) => item.students), 1);
      const labels = trend
        .map((item) => `${item.year} ${formatCount(item.students)}명`)
        .join(" · ");
      const bars = trend
        .map((item) => {
          const height = Math.max(18, Math.round((item.students / maxStudents) * 48));
          return `
            <div class="trend-bar-col">
              <div class="trend-bar" style="height:${height}px;"></div>
              <div class="trend-year">${item.year}</div>
            </div>
          `;
        })
        .join("");

      return `
        <div class="trend-card">
          <div class="trend-bars">${bars}</div>
          <div class="trend-labels">${labels}</div>
        </div>
      `;
    }

    function getPopupHtml(row) {
      const schoolName = getSchoolName(row);
      const gu = detectGu(row) || "-";

      const hasPriorityData =
        row.priority_score !== undefined &&
        row.case_type !== undefined &&
        row.iso_park_count !== undefined &&
        row.iso_child_6_12 !== undefined &&
        row.access_ratio !== undefined &&
        row.gap_count !== undefined;

      if (!hasPriorityData) {
        return `
          <div style="padding:14px 16px; min-width:220px; font-family:Pretendard,'Noto Sans KR',sans-serif;">
            <div style="font-weight:800; font-size:15px; margin-bottom:6px;">${schoolName}</div>
            <div style="font-size:12px; color:#6b7280;">${gu}</div>
            <div style="margin-top:12px; font-size:12px; color:#4b5563;">데이터 준비 중</div>
          </div>
        `;
      }

      const caseType = Number(row.case_type);
      const caseTypeLabel = getCaseTypeLabel(caseType);
      const isoParkCount = row.iso_park_count ?? "-";
      const isoChild = row.iso_child_6_12 ?? "-";
      const gapCount = formatDecimal(row.gap_count, 2);
      const trendMarkup = getStudentTrendMarkup(row);

      return `
        <div style="padding:14px 16px; min-width:260px; line-height:1.65; font-family:Pretendard,'Noto Sans KR',sans-serif;">
          <b>${schoolName}</b> (${gu})<br>
          ─────────────────<br>
          🏷 유형: case_type ${caseType} (${caseTypeLabel})<br>
          🌳 도보 접근 공원: ${isoParkCount}개 / 직선 반경 내 공원: ${formatCount(row.buf_park_count)}개<br>
          🛝 도보 접근 놀이터: ${formatCount(row.iso_playground_count)}개 / 직선 반경 내 놀이터: ${formatCount(row.buf_playground_count)}개<br>
          👶 초등학령 아동: ${formatCount(isoChild)}명<br>
          📊 접근성 비율: ${formatAccessRatio(row.access_ratio)} (도보/직선)<br>
          📉 공원 부족: ${gapCount}개 (평균 대비)<br>
          ${trendMarkup}
        </div>
      `;
    }

    function getClickSearchPopupHtml(rows) {
      if (!rows.length) {
        return `
          <div style="padding:14px 16px; min-width:220px; line-height:1.6; font-family:Pretendard,'Noto Sans KR',sans-serif;">
            <div style="font-weight:800; font-size:14px; margin-bottom:6px;">500m 학교 탐색</div>
            <div style="font-size:12px; color:#4b5563;">500m 이내 학교 없음</div>
          </div>
        `;
      }

      const items = rows
        .map((row) => {
          const schoolName = getSchoolName(row);
          const beneficiary = formatCount(row.current_beneficiary);
          const parkCount = formatCount(row.iso_park_count);
          const star = Number(row.priority_score) >= 3 ? " ⭐" : "";
          return `<li style="margin-bottom:8px;">${schoolName} | 수혜인구 ${beneficiary} | 등시선 내 공원 ${parkCount}${star}</li>`;
        })
        .join("");

      return `
        <div style="padding:14px 16px; min-width:320px; max-width:360px; line-height:1.6; font-family:Pretendard,'Noto Sans KR',sans-serif;">
          <div style="font-weight:800; font-size:14px; margin-bottom:8px;">500m 학교 탐색</div>
          <ul style="padding-left:18px; margin:0; font-size:12px; color:#1f2937;">
            ${items}
          </ul>
        </div>
      `;
    }

    function getDiagnosticMessage(row = {}) {
      const numeric = Number(row.case_type);
      if (numeric === 1) return "도보 접근은 가능하나 공원 수가 부족합니다. 관심 필요 학교입니다.";
      if (numeric === 2) return "인근 아동 대비 공원이 현저히 부족합니다. 우선 지원 대상입니다.";
      if (numeric === 3) return "접근성과 공원 수 모두 취약합니다. 최우선 지원 대상입니다.";
      return "공원 접근성이 양호합니다. 일반 관리 대상입니다.";
    }

    function getCaseThemeClass(row = {}) {
      const numeric = Number(row.case_type);
      return `case-${Number.isFinite(numeric) ? numeric : 4}`;
    }

    function getMetricClass(row, metricType) {
      const numeric = Number(row.case_type);
      if (numeric === 4) return "metric-item muted";
      if (numeric === 1 && metricType === "park") return "metric-item warning";
      if (numeric === 2 && metricType === "parkPressure") return "metric-item danger";
      if (numeric === 3 && (metricType === "park" || metricType === "access" || metricType === "parkPressure")) {
        return "metric-item danger";
      }
      return "metric-item";
    }

    function renderSchoolDetail(row = null) {
      if (!row) {
        ui.schoolDetailBox.className = "school-detail-box";
        ui.schoolDetailBox.innerHTML = "학교 마커를 클릭하면 상세 정보를 표시합니다.";
        return;
      }

      const caseType = Number(row.case_type);
      const caseLabel = getCaseTypeLabel(caseType);
      const badge = getSchoolBadge(row);
      const mirageBadge = getMirageBadge(row);
      const gu = detectGu(row) || "-";
      const showAccess = caseType >= 1 && caseType <= 3;
      const showGap = caseType >= 1 && caseType <= 3;
      const message = getDiagnosticMessage(row);
      const trendMarkup = getStudentTrendMarkup(row);
      const redevelopmentMarkup = getRedevelopmentMarkup(row);
      const nearestParkName = row.nearest_park_name || "공원 정보 없음";
      const nearestParkDistance = formatDistanceMeters(row.nearest_park_dist_m);
      const isoCnt = Number(row.iso_park_count);
      const bufCnt = Number(row.buf_park_count);
      const nearestParkStatus = isoCnt >= 1
        ? "🟢 도보 500m 내 공원 있음"
        : bufCnt >= 1
          ? "🟡 직선 500m 내 공원 있음 (도보 경로 미확인)"
          : "🔴 500m 내 공원 없음";
      const hasLargeApt = String(row.has_large_apt || "").toLowerCase() === "true";

      ui.schoolDetailBox.className = `school-detail-box ${getCaseThemeClass(row)}`;
      ui.schoolDetailBox.innerHTML = `
        <div class="detail-head">
          <h3 class="detail-name">${getSchoolName(row)} (${gu})</h3>
          <div class="detail-subtitle">${caseLabel}</div>
          <div class="detail-badge-row">
            <div class="detail-badge ${badge.className}">[${badge.text}]</div>
            ${mirageBadge ? `<div class="detail-badge ${mirageBadge.className}">[${mirageBadge.text}]</div>` : ""}
          </div>
        </div>
        <div class="detail-message ${getCaseThemeClass(row)}">
          ${message}
          ${mirageBadge ? `<div class="detail-message-extra">📍 행정 기준과 실제 도보 접근 환경 간 괴리가 큰 학교입니다.</div>` : ""}
        </div>

        <div class="detail-section">
          <div class="detail-section-title">공원·놀이터 현황</div>
          <div class="metric-list">
            <div class="${getMetricClass(row, "park")}">🌳 가장 가까운 공원: 약 ${nearestParkDistance}m (${nearestParkName})</div>
            <div class="${getMetricClass(row, "park")}">${nearestParkStatus}</div>
            <div class="${getMetricClass(row, "park")}">🛝 도보 접근 놀이터: ${formatCount(row.iso_playground_count)}개 / 직선 반경 내 놀이터: ${formatCount(row.buf_playground_count)}개</div>
            ${hasLargeApt ? `<div class="metric-item warning">🏘️ 인근 대단지 아파트 존재 — 미집계 민간 놀이터가 있을 수 있습니다.</div>` : ""}
            ${showAccess ? `<div class="${getMetricClass(row, "access")}">📊 접근성 비율: ${formatAccessRatio(row.access_ratio)} (도보/직선)</div>` : ""}
            ${showGap ? `<div class="${getMetricClass(row, "parkPressure")}">📉 공원 부족: ${formatDecimal(row.gap_count, 2)}개 (평균 대비)</div>` : ""}
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">학생수 추세</div>
          ${trendMarkup}
        </div>

        <div class="detail-section">
          <div class="detail-section-title">🏗️ 인근 재개발 구역 (500m 이내)</div>
          ${redevelopmentMarkup}
        </div>
      `;
    }

    function shouldUseSchoolClusterer() {
      return Boolean(state.map) && state.map.getLevel() < 11;
    }

    function getSummaryRow() {
      return state.datasets.guSummary.find((row) => String(row.gu || "").trim() === state.selectedGu) || null;
    }

    function renderGuSummary() {
      if (state.selectedGu === "전체") {
        ui.guSummaryBox.innerHTML = `
          <div class="summary-grid">
            <div>총 학교 수: ${formatCount(state.datasets.schools.length)}개</div>
            <div>우선지원 학교 수: ${formatCount(state.datasets.schools.filter((row) => Number(row.priority_score) >= 3).length)}개</div>
            <div>공원 0개 학교 수: ${formatCount(state.datasets.schools.filter((row) => Number(row.iso_park_count) === 0).length)}개</div>
          </div>
        `;
        return;
      }

      const summary = getSummaryRow();
      if (!summary) {
        ui.guSummaryBox.innerHTML = "선택한 구의 요약 데이터가 없습니다.";
        return;
      }

      ui.guSummaryBox.innerHTML = `
        <div class="summary-grid">
          <div>총 학교 수: ${formatCount(summary.total_school_count)}개</div>
          <div>우선지원 학교 수: ${formatCount(summary.priority_score_3plus_count)}개</div>
          <div>공원 0개 학교 수: ${formatCount(summary.iso_park_count_0_count)}개</div>
        </div>
      `;
    }

    function focusSchoolById(schoolId) {
      const row = state.datasets.schools.find((item) => getSchoolId(item) === schoolId);
      if (!row) return;

      const latLng = toLatLng(row, row["위도"] !== undefined ? "위도" : "lat", row["경도"] !== undefined ? "경도" : "lng");
      if (!latLng) return;

      highlightIsochroneForSchool(row);
      state.selectedSchoolId = schoolId;
      renderSchoolDetail(row);
      state.map.setLevel(11);
      state.map.panTo(latLng);
      state.infoWindow.close();
    }

    function distanceInMeters(lat1, lng1, lat2, lng2) {
      const toRadians = (degrees) => (degrees * Math.PI) / 180;
      const earthRadius = 6371000;
      const dLat = toRadians(lat2 - lat1);
      const dLng = toRadians(lng2 - lng1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRadians(lat1)) * Math.cos(toRadians(lat2)) * Math.sin(dLng / 2) ** 2;
      return 2 * earthRadius * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function findNearbySchools(latLng, radiusMeters = 500) {
      const clickLat = latLng.getLat();
      const clickLng = latLng.getLng();

      return state.datasets.schools
        .filter(shouldShowByGu)
        .map((row) => {
          const schoolLat = Number(row["위도"]);
          const schoolLng = Number(row["경도"]);
          if (!Number.isFinite(schoolLat) || !Number.isFinite(schoolLng)) return null;
          const distance = distanceInMeters(clickLat, clickLng, schoolLat, schoolLng);
          if (distance > radiusMeters) return null;
          return { ...row, __distance: distance };
        })
        .filter(Boolean)
        .sort((left, right) => left.__distance - right.__distance);
    }

    function applyPolygonStyle(polygon, style) {
      polygon.setOptions({
        strokeWeight: style.strokeWeight,
        strokeColor: style.strokeColor,
        strokeOpacity: style.strokeOpacity,
        strokeStyle: style.strokeStyle || "solid",
        fillColor: style.fillColor,
        fillOpacity: style.fillOpacity
      });
    }

    function highlightIsochroneForSchool(row) {
      const joinKeys = new Set(getSchoolJoinKeys(row));
      state.selectedSchoolJoinKey = Array.from(joinKeys)[0] || null;

      state.overlays.isochronePolygons.forEach((polygon) => {
        const matched = polygon.__schoolKeys?.some((key) => joinKeys.has(key));
        applyPolygonStyle(polygon, matched ? polygon.__highlightStyle : polygon.__defaultStyle);
      });

      updateOverlayVisibility();
    }

    function clearOverlayGroup(groupName) {
      state.overlays[groupName].forEach((overlay) => {
        if (typeof overlay.setMap === "function") overlay.setMap(null);
      });
      state.overlays[groupName] = [];
    }

    function shouldShowByGu(row) {
      if (state.selectedGu === "전체") return true;
      return detectGu(row) === state.selectedGu;
    }

    function bindSchoolPopup(marker, row) {
      kakao.maps.event.addListener(marker, "click", () => {
        state.suppressNextMapClick = true;
        highlightIsochroneForSchool(row);
        state.selectedSchoolId = getSchoolId(row);
        renderSchoolDetail(row);
        state.infoWindow.close();
      });
    }

    function renderSchoolMarkers() {
      clearOverlayGroup("schoolMarkers");
      state.schoolMarkerIndex = new Map();
      if (state.clusterer) {
        state.clusterer.clear();
      }

      const rows = state.datasets.schools.filter(shouldShowByGu);
      rows.forEach((row) => {
        const latLng = toLatLng(row, row.위도 !== undefined ? "위도" : "lat", row.경도 !== undefined ? "경도" : "lng");
        if (!latLng) return;
        const markerStyle = getMarkerStyle(row);

        const marker = new kakao.maps.Marker({
          position: latLng,
          image: createMarkerImage(markerStyle.color, markerStyle.symbol, markerStyle.borderColor),
          title: getSchoolName(row)
        });

        bindSchoolPopup(marker, row);
        marker.__schoolId = getSchoolId(row);
        marker.__schoolRow = row;
        state.schoolMarkerIndex.set(marker.__schoolId, marker);
        state.overlays.schoolMarkers.push(marker);
      });

      if (shouldUseSchoolClusterer()) {
        state.clusterer.addMarkers(state.overlays.schoolMarkers);
      } else {
        state.overlays.schoolMarkers.forEach((marker) => marker.setMap(state.map));
      }
    }

    function renderPointMarkers(groupName, rows, options) {
      clearOverlayGroup(groupName);

      rows.filter(shouldShowByGu).forEach((row) => {
        const latLng = toLatLng(row, options.latKey, options.lngKey);
        if (!latLng) return;

        const marker = new kakao.maps.Marker({
          position: latLng,
          title: row[options.titleKey] || options.fallbackTitle,
          image: createMarkerImage(options.color)
        });

        const popupName = row[options.titleKey] || options.fallbackTitle;
        kakao.maps.event.addListener(marker, "click", () => {
          state.infoWindow.setContent(`
            <div style="padding:12px 14px; min-width:160px; font-family:Pretendard,'Noto Sans KR',sans-serif;">
              <div style="font-weight:800; font-size:14px; margin-bottom:6px;">${popupName}</div>
              <div style="font-size:12px; color:#6b7280;">${detectGu(row) || "-"}</div>
            </div>
          `);
          state.infoWindow.open(state.map, marker);
        });

        marker.setMap(options.visible ? state.map : null);
        state.overlays[groupName].push(marker);
      });
    }

    function geometryToOverlays(geojson, style) {
      const overlays = [];
      if (!geojson || !Array.isArray(geojson.features)) return overlays;

      geojson.features.forEach((feature) => {
        if (!shouldShowByGu(feature.properties || {})) return;

        const geometry = feature.geometry;
        if (!geometry) return;

        if (geometry.type === "Polygon") {
          const polygon = new kakao.maps.Polygon({
            path: geometry.coordinates[0].map(([lng, lat]) => new kakao.maps.LatLng(lat, lng)),
            strokeWeight: style.strokeWeight,
            strokeColor: style.strokeColor,
            strokeOpacity: style.strokeOpacity,
            strokeStyle: style.strokeStyle || "solid",
            fillColor: style.fillColor,
            fillOpacity: style.fillOpacity
          });
          polygon.__schoolKeys = [feature.properties?.["학교ID"], feature.properties?.["학교명"]].filter(Boolean);
          polygon.__defaultStyle = { ...style };
          polygon.__highlightStyle = {
            strokeWeight: 3,
            strokeColor: "#E53E3E",
            strokeOpacity: 1,
            strokeStyle: "solid",
            fillColor: "#FEB2B2",
            fillOpacity: 0.4
          };
          overlays.push(polygon);
        }

        if (geometry.type === "MultiPolygon") {
          geometry.coordinates.forEach((polygonCoords) => {
            const polygon = new kakao.maps.Polygon({
              path: polygonCoords[0].map(([lng, lat]) => new kakao.maps.LatLng(lat, lng)),
              strokeWeight: style.strokeWeight,
              strokeColor: style.strokeColor,
              strokeOpacity: style.strokeOpacity,
              strokeStyle: style.strokeStyle || "solid",
              fillColor: style.fillColor,
              fillOpacity: style.fillOpacity
            });
            polygon.__schoolKeys = [feature.properties?.["학교ID"], feature.properties?.["학교명"]].filter(Boolean);
            polygon.__defaultStyle = { ...style };
            polygon.__highlightStyle = {
              strokeWeight: 3,
              strokeColor: "#E53E3E",
              strokeOpacity: 1,
              strokeStyle: "solid",
              fillColor: "#FEB2B2",
              fillOpacity: 0.4
            };
            overlays.push(polygon);
          });
        }
      });

      return overlays;
    }

    function renderGeoJsonLayer(groupName, geojson, style, visible) {
      clearOverlayGroup(groupName);
      const overlays = geometryToOverlays(geojson, style);
      overlays.forEach((overlay) => applyPolygonStyle(overlay, overlay.__defaultStyle || style));
      overlays.forEach((overlay) => overlay.setMap(visible ? state.map : null));
      state.overlays[groupName] = overlays;
    }

    function renderRedevelopmentLayer() {
      clearOverlayGroup("redevelopmentMarkers");
      const rows = state.datasets.redevelopment.filter(shouldShowByGu);

      rows.forEach((row) => {
        const hasCoords = Number.isFinite(Number(row.위도)) && Number.isFinite(Number(row.경도));
        if (!hasCoords) return;

        const marker = new kakao.maps.Marker({
          position: new kakao.maps.LatLng(Number(row.위도), Number(row.경도)),
          title: row.구역명 || "재개발 구역",
          image: createMarkerImage("#6B46C1")
        });

        marker.setMap(ui.toggles.redevelopment.checked ? state.map : null);
        state.overlays.redevelopmentMarkers.push(marker);
      });

      if (!state.overlays.redevelopmentMarkers.length && state.datasets.redevelopment.length) {
        console.warn("[redevelopment] 좌표 컬럼이 없어 지도 렌더링을 생략했습니다.");
      }
    }

    function updateOverlayVisibility() {
      state.overlays.parkMarkers.forEach((marker) => marker.setMap(ui.toggles.parks.checked ? state.map : null));
      state.overlays.childcareMarkers.forEach((marker) => marker.setMap(ui.toggles.childcare.checked ? state.map : null));
      state.overlays.redevelopmentMarkers.forEach((marker) => marker.setMap(ui.toggles.redevelopment.checked ? state.map : null));
      state.overlays.isochronePolygons.forEach((polygon) => polygon.setMap(ui.toggles.isochrone.checked ? state.map : null));
      state.overlays.bufferPolygons.forEach((polygon) => polygon.setMap(ui.toggles.buffer.checked ? state.map : null));
      syncLayerToggleButtons();
    }

    function rerenderAll() {
      renderSchoolMarkers();
      renderPointMarkers("parkMarkers", state.datasets.parks, {
        latKey: "위도",
        lngKey: "경도",
        titleKey: "공원명",
        fallbackTitle: "공원",
        color: "#2B6CB0",
        visible: ui.toggles.parks.checked
      });
      renderPointMarkers("childcareMarkers", state.datasets.childcare, {
        latKey: "위도",
        lngKey: "경도",
        titleKey: "기관명",
        fallbackTitle: "어린이집·유치원",
        color: "#2F855A",
        visible: ui.toggles.childcare.checked
      });
      renderRedevelopmentLayer();
      renderGeoJsonLayer("isochronePolygons", state.datasets.isochrone, {
        strokeWeight: 2,
        strokeColor: "#2B6CB0",
        strokeOpacity: 0.9,
        fillColor: "#90CDF4",
        fillOpacity: 0.22
      }, ui.toggles.isochrone.checked);
      renderGeoJsonLayer("bufferPolygons", state.datasets.buffer, {
        strokeWeight: 2,
        strokeColor: "#ED8936",
        strokeOpacity: 0.9,
        strokeStyle: "dash",
        fillColor: "#FBD38D",
        fillOpacity: 0.12
      }, ui.toggles.buffer.checked);
      updateOverlayVisibility();
      renderGuSummary();
      const selectedRow = state.datasets.schools.find((row) => getSchoolId(row) === state.selectedSchoolId);
      if (selectedRow && shouldShowByGu(selectedRow)) {
        renderSchoolDetail(selectedRow);
      } else {
        state.selectedSchoolId = null;
        renderSchoolDetail(null);
      }
    }

    async function loadData() {
      setStatus("데이터를 불러오는 중입니다.");

      const [
        schoolPriority,
        schoolCoords,
        studentTrend,
        nearestPark,
        beneficiaryForecast,
        guSummary,
        parks,
        isochrone,
        buffer,
        redevelopment,
        childcare
      ] = await Promise.all([
        loadCSV(PATHS.schools),
        loadCSV(PATHS.schoolCoords),
        loadCSV(PATHS.studentTrend),
        loadCSV(PATHS.nearestPark),
        loadCSV(PATHS.beneficiaryForecast),
        loadCSV(PATHS.guSummary),
        loadCSV(PATHS.parks),
        loadGeoJSON(PATHS.isochrone),
        loadGeoJSON(PATHS.buffer),
        loadCSV(PATHS.redevelopment),
        loadCSV(PATHS.childcare)
      ]);

      state.datasets.studentTrend = studentTrend;
      state.datasets.nearestPark = nearestPark;
      state.datasets.schoolCoords = schoolCoords;
      state.datasets.beneficiaryForecast = beneficiaryForecast;
      state.datasets.guSummary = guSummary;
      state.datasets.schools = enrichSchoolRows(
        mergeSchoolPriorityWithCoords(schoolPriority, schoolCoords),
        beneficiaryForecast,
        studentTrend,
        nearestPark
      );
      state.datasets.parks = parks;
      state.datasets.isochrone = isochrone;
      state.datasets.buffer = buffer;
      state.datasets.redevelopment = redevelopment;
      state.datasets.childcare = childcare;

      rerenderAll();
      renderGuSummary();

      setStatus(
        [
          `학교 우선순위: ${schoolPriority.length}건`,
          `학교 좌표: ${schoolCoords.length}건`,
          `학생수 추세: ${studentTrend.length}건`,
          `최근접 공원 거리: ${nearestPark.length}건`,
          `수혜인구 예측: ${beneficiaryForecast.length}건`,
          `구 요약: ${guSummary.length}건`,
          `지도 표시 학교: ${state.datasets.schools.filter((row) => Number.isFinite(Number(row["위도"])) && Number.isFinite(Number(row["경도"]))).length}건`,
          `공원·놀이터: ${parks.length}건`,
          `어린이집·유치원: ${childcare.length}건`,
          `재개발: ${redevelopment.length}건`,
          `도보 등시선: ${isochrone?.features?.length || 0}건`,
          `직선 버퍼: ${buffer?.features?.length || 0}건`
        ].join("\n")
      );

      if (!schoolPriority.length) {
        appendStatus("school_priority.csv가 아직 없거나 로딩에 실패했습니다.");
      }
    }

    function wireEvents() {
      ui.guFilter.addEventListener("change", (event) => {
        state.selectedGu = event.target.value;
        rerenderAll();
      });

      setupLayerToggleBar();

      Object.values(ui.toggles).forEach((toggle) => {
        toggle.addEventListener("change", updateOverlayVisibility);
      });

      ui.panelToggleButton.addEventListener("click", () => {
        ui.panel.classList.toggle("open");
        ui.panelToggleButton.textContent = ui.panel.classList.contains("open") ? "필터 닫기" : "필터 열기";
      });

      kakao.maps.event.addListener(state.map, "zoom_changed", () => {
        renderSchoolMarkers();
      });

      kakao.maps.event.addListener(state.map, "click", (mouseEvent) => {
        if (state.suppressNextMapClick) {
          state.suppressNextMapClick = false;
          return;
        }

        const nearbySchools = findNearbySchools(mouseEvent.latLng, 500);
        state.infoWindow.setContent(getClickSearchPopupHtml(nearbySchools));
        state.infoWindow.setPosition(mouseEvent.latLng);
        state.infoWindow.open(state.map);
      });
    }

    async function init() {
      try {
        await loadKakaoMapSdk();
      } catch (error) {
        console.error("[kakao-sdk]", error);
        setStatus("카카오맵 SDK 로딩에 실패했습니다. API 키와 네트워크 상태를 확인하세요.");
        return;
      }

      state.map = new kakao.maps.Map(document.getElementById("map"), {
        center: new kakao.maps.LatLng(INCHEON_CENTER.lat, INCHEON_CENTER.lng),
        level: DEFAULT_LEVEL
      });

      state.clusterer = new kakao.maps.MarkerClusterer({
        map: state.map,
        averageCenter: true,
        minLevel: 1,
        disableClickZoom: true,
        styles: [
          {
            width: "44px",
            height: "44px",
            background: "rgba(20, 83, 45, 0.88)",
            borderRadius: "22px",
            color: "#fff",
            textAlign: "center",
            fontWeight: "800",
            lineHeight: "44px",
            border: "2px solid rgba(255,255,255,0.9)"
          }
        ]
      });
      kakao.maps.event.addListener(state.clusterer, "clusterclick", (cluster) => {
        state.map.setLevel(Math.max(state.map.getLevel() - 1, 1), { anchor: cluster.getCenter() });
      });
      state.infoWindow = new kakao.maps.InfoWindow({ removable: true });
      wireEvents();
      await loadData();
    }

    init();
  </script>
</body>
</html>
